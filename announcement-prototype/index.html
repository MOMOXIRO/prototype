<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>公告管理原型</title>
<style>
:root{
  --bg:#f5f6fa;--panel:#fff;--line:#e6eaf2;--text:#1f2430;--muted:#97a0b3;
  --pri:#2f6bff;--pri-hover:#245cf0;--soft:#e8f0ff;--ok:#166534;--warn:#c2410c;--danger:#b91c1c;
  --field-line:#d5ddeb;--head-bg:#f3f6fb;--radius:8px;
  --shadow-panel:0 10px 26px rgba(15,23,42,.08);--shadow-pop:0 18px 42px rgba(15,23,42,.18);
  --focus:0 0 0 3px rgba(47,107,255,.2);
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);font-size:14px}
button,input,select,textarea{font:inherit}
input:focus,select:focus,textarea:focus,button:focus{outline:none;box-shadow:var(--focus)}

.page{padding:16px 24px 32px}
.page-header{margin-bottom:16px;display:flex;align-items:baseline;gap:10px}
.page-header h1{margin:0;font-size:24px;font-weight:700;color:var(--text);line-height:1.2}
.page-header-tz{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.02em;line-height:1.4}

.shell{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow-panel);overflow:hidden;min-height:720px}
.meta-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--line);background:#fbfcff;font-size:11px;color:var(--muted)}
.meta-crumb{display:flex;align-items:center;gap:8px}
.meta-tag{padding:2px 8px;border-radius:999px;background:var(--soft);color:var(--pri);font-weight:600}
.shell-body{padding:16px}

.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:#fff}
.title{font-weight:600;font-size:16px;color:var(--text)}
.sub{font-size:12px;color:var(--muted);margin-top:4px}
.body{padding:16px 18px}

.btn{height:34px;padding:0 14px;border:1px solid var(--pri);background:var(--pri);border-radius:7px;cursor:pointer;color:#fff;font-size:13px;font-weight:600;box-shadow:0 4px 10px rgba(47,107,255,.24);transition:transform .12s ease,background .12s ease}
.btn:hover{background:var(--pri-hover)}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--pri);border-color:var(--pri);color:#fff}
.btn.ghost{background:#fff;border-color:var(--field-line);color:#475569;box-shadow:none;font-weight:500}
.btn.ghost:hover{color:var(--pri);border-color:#c4d0e6;background:#fff}
.btn.compact{height:30px;padding:0 14px;font-size:12px}
.head-actions{display:flex;align-items:center;gap:8px}
.lang-sync-hint{font-size:13px;color:#64748b;line-height:1.7;margin-bottom:14px}
.lang-sync-all{margin-bottom:14px}
.lang-sync-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px 14px}
.lang-sync-item{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:#334155;cursor:pointer;user-select:none}
.lang-sync-item.is-current{color:#94a3b8;cursor:default}
.lang-sync-item input{width:16px;height:16px;accent-color:var(--pri);cursor:pointer}
.lang-sync-item input:disabled{cursor:not-allowed;opacity:.7}

.actions{display:flex;gap:8px;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;align-items:start}
.grid3 > .hidden,.grid4 > .hidden{display:none !important}
.duration-wrap{display:flex;gap:8px;align-items:center;width:100%}
.duration-wrap .control.num{flex:1 1 0;min-width:0}
.duration-wrap .control.unit{flex:0 0 90px;width:90px;padding:0 8px}
.duration-unit-text{flex:0 0 auto;color:#475569;font-size:13px;font-weight:500;min-width:1.5em}
.field{display:flex;flex-direction:column;gap:6px;min-width:0}
.label{font-size:13px;font-weight:500;color:#334155}
.label .req{color:#ef4444;margin-right:2px;font-weight:700}
.control{height:34px;border:1px solid var(--field-line);border-radius:7px;padding:0 10px;width:100%;background:#fff;color:#1f2937;font-size:14px;transition:border-color .15s ease,box-shadow .15s ease}
.control:hover{border-color:#c4d0e6}
.control:focus{border-color:var(--pri)}
textarea.control{height:150px;padding:10px;line-height:1.7;resize:vertical}

.filter-panel{border:1px solid #dfe5f0;border-radius:10px;background:linear-gradient(180deg,#fbfdff 0%,#f8fbff 100%);box-shadow:inset 0 1px 0 #fff;padding:14px}
.filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-item{display:flex;flex-direction:column;gap:6px}
.name-filter{width:180px}
.project-filter,.status-filter,.mode-filter{width:130px}
.cycle-filter{width:140px}
.date-range-filter{width:300px;min-width:280px}
.range-wrap{display:flex;align-items:center;height:34px;border:1px solid #d5ddeb;border-radius:6px;background:#fff;padding:0 10px;gap:8px;width:100%}
.range-wrap input{width:0;min-width:0;flex:1 1 0;border:none;outline:none;background:transparent;font-size:14px;color:var(--text)}
.range-wrap input::placeholder{color:#9aa5b6}
.range-mid{color:#9aa5b6;font-weight:600;flex:0 0 auto}
.filter-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.list-actions{display:flex;align-items:center;gap:8px;margin-top:10px}
.list-pager{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:12px;flex-wrap:wrap}
.list-pager-info{font-size:13px;color:var(--muted);margin-right:auto}
.pager-btn{min-width:32px;height:32px;padding:0 10px;border:1px solid var(--field-line);background:#fff;border-radius:6px;color:#334155;font-size:13px;cursor:pointer}
.pager-btn:hover:not(:disabled){border-color:var(--pri);color:var(--pri)}
.pager-btn.active{background:var(--pri);border-color:var(--pri);color:#fff;font-weight:600}
.pager-btn:disabled{opacity:.4;cursor:not-allowed}

.table-wrap{border:1px solid #dfe5f0;border-radius:10px;background:#fff;box-shadow:0 6px 18px rgba(15,23,42,.05);overflow:auto;margin-top:10px}
.data-table{width:100%;border-collapse:collapse;table-layout:auto;min-width:1280px}
.data-table th,.data-table td{padding:0 12px;text-align:left;white-space:nowrap}
.data-table thead th{height:40px;background:var(--head-bg);color:#334155;font-weight:600;font-size:14px}
.data-table tbody td{height:48px;color:#1f2937;font-size:14px;border-top:1px solid #edf1f7;vertical-align:middle}
.data-table tbody td:last-child{height:auto;padding-top:10px;padding-bottom:10px}
.data-table tbody tr:hover{background:#fafcff}
.data-table th:first-child,.data-table td:first-child{padding-left:16px}
.data-table th:last-child,.data-table td:last-child{padding-right:16px}

.pill{display:inline-flex;align-items:center;height:22px;padding:0 8px;border-radius:999px;font-size:11px;font-weight:700;line-height:22px}
.pill.ok{background:#dcfce7;color:var(--ok)}
.pill.warn{background:#ffedd5;color:var(--warn)}
.pill.off{background:#fee2e2;color:#b91c1c}
.pill.draft{background:#eef2f7;color:#64748b}
.pill.cancel{background:#f1f5f9;color:#64748b}
.pill.cycle-none{background:#f1f5f9;color:#94a3b8}
.pill.cycle-on{background:#e0e7ff;color:#3730a3}
.pill.cycle-off{background:#ffe4e6;color:#9f1239}
.cycle-info{display:flex;flex-direction:column;gap:2px;line-height:1.35;white-space:normal;min-width:108px}
.cycle-info .cycle-rule{color:#334155;font-weight:500;font-size:13px}
.cycle-info .cycle-period{color:#64748b;font-size:12px}
.cycle-info .cycle-empty{color:#94a3b8}
.text-btn{height:28px;padding:0 8px;border:1px solid var(--field-line);background:#fff;border-radius:6px;color:#334155;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.text-btn:hover{border-color:#c4d0e6;color:var(--pri)}
.text-btn.danger{border-color:#fecaca;color:#b91c1c}
.text-btn.danger:hover{background:#fef2f2}
.term-options{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.term-option{display:flex;gap:8px;align-items:flex-start;padding:10px 12px;border:1px solid var(--field-line);border-radius:8px;cursor:pointer}
.term-option:has(input:checked){border-color:var(--pri);background:#f5f8ff}
.term-option input{margin-top:3px;accent-color:var(--pri)}
.term-option span{font-size:13px;line-height:1.5;color:#334155}

.icon-actions{display:inline-flex;align-items:center;gap:8px;flex-wrap:nowrap;white-space:nowrap}
.icon-btn{width:34px;height:34px;border:none;border-radius:8px;background:var(--pri);color:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 3px 8px rgba(47,107,255,.28);transition:transform .12s ease,background .12s ease,box-shadow .12s ease}
.icon-btn:hover{background:var(--pri-hover)}
.icon-btn:active{transform:translateY(1px)}
.icon-btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.icon-btn:disabled:hover{background:var(--pri)}
.icon-btn.danger{background:#ef4444;box-shadow:0 3px 8px rgba(239,68,68,.3)}
.icon-btn.danger:hover{background:#dc2626}
.icon-btn.danger:disabled:hover{background:#ef4444}
.icon-btn svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.data-table tr.is-disabled td{color:#94a3b8}
.shelf-action{display:inline-flex;align-items:center;gap:5px;margin-right:4px;color:#64748b;font-size:12px;cursor:pointer}
.shelf-switch{position:relative;width:34px;height:18px;display:inline-block}
.shelf-switch input{position:absolute;opacity:0;pointer-events:none}
.shelf-slider{position:absolute;inset:0;border-radius:999px;background:#cbd5e1;transition:.18s}
.shelf-slider:before{content:"";position:absolute;width:14px;height:14px;left:2px;top:2px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(15,23,42,.25);transition:.18s}
.shelf-switch input:checked + .shelf-slider{background:var(--pri)}
.shelf-switch input:checked + .shelf-slider:before{transform:translateX(16px)}
.shelf-switch input:disabled + .shelf-slider{opacity:.45;cursor:not-allowed}
.shelf-text{min-width:24px}

.hidden{display:none}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 380px;gap:16px}
.stack{display:flex;flex-direction:column;gap:16px}
.tabs{display:flex;flex-wrap:wrap;border-bottom:1px solid var(--line);padding:0 18px;gap:4px 10px;background:#fff}
.tab{border:none;background:transparent;padding:10px 4px;cursor:pointer;color:#334155;border-bottom:2px solid transparent;font-size:13px;font-weight:500;white-space:nowrap}
.tab.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:600}
.lang-toolbar{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;border-bottom:1px solid var(--line);background:#fff;padding:0 18px}
.lang-toolbar .tabs{flex:1 1 auto;min-width:0;border-bottom:none;padding:0;background:transparent}
.lang-toolbar .head-actions{flex:0 0 auto;padding-bottom:8px;align-self:center}
.tokens{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.token{height:30px;padding:0 12px;border:1px solid var(--pri);background:var(--pri);color:#fff;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;box-shadow:0 4px 10px rgba(47,107,255,.24)}
.token:hover{background:var(--pri-hover)}

.preview{position:sticky;top:16px}
.phone{margin:16px;background:#eef2f7;border:8px solid #111827;border-radius:28px;min-height:560px;overflow:hidden;display:flex;flex-direction:column}
.phoneTop{height:34px;flex:0 0 34px;background:#111827;color:#fff;padding:9px 15px;font-size:11px}
.phoneBody{padding:16px 14px;position:relative;flex:1 1 auto;min-height:480px;background:#eef2f7}
.notice{background:#fff;border-radius:16px;padding:18px;box-shadow:0 4px 14px rgba(15,23,42,.08)}
.notice h3{margin:0 0 12px;font-size:16px}
.notice p{white-space:pre-line;line-height:1.7;color:#4b5563;margin:0}
.box{margin-top:14px;padding:12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;font-size:13px}
.alert{padding:10px 12px;border-radius:8px;border:1px solid #fde68a;background:#fffbeb;color:#92400e;font-size:12px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--pri)}

.param-range{display:flex;align-items:center;gap:6px;min-width:260px}
.param-range .control{min-width:0;flex:1 1 0}
.param-range .range-mid{flex:0 0 auto;color:#9aa5b6;font-weight:600}
.param-type-stack{display:flex;flex-direction:column;gap:6px;min-width:128px}
.param-type-stack .control{width:100%;box-sizing:border-box}
.check-panel{position:relative;border:1px solid #d5ddeb;border-radius:8px;background:#fff;z-index:1}
.check-panel.is-open{z-index:30}
.check-panel-head{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#eef4ff;border-radius:8px;font-size:12px;color:#334155;font-weight:500;cursor:pointer;user-select:none}
.check-panel.is-open .check-panel-head{border-radius:8px 8px 0 0;border-bottom:1px solid #dbe4ff}
.check-panel-head .check-panel-all-wrap{display:inline-flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap}
.check-panel-summary{color:#64748b;font-weight:400;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.check-panel-toggle{margin-left:auto;border:none;background:transparent;color:#64748b;font-size:12px;cursor:pointer;padding:0 2px;flex:0 0 auto}
.check-panel-body{display:none;position:absolute;left:0;right:0;top:calc(100% - 1px);grid-template-columns:repeat(2,minmax(0,1fr));gap:6px 10px;padding:10px;max-height:180px;overflow:auto;background:#fff;border:1px solid #d5ddeb;border-top:none;border-radius:0 0 8px 8px;box-shadow:0 10px 24px rgba(15,23,42,.12);z-index:31}
.check-panel.is-open .check-panel-body{display:grid}
.check-panel-item{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#334155;cursor:pointer;user-select:none;min-width:0}
.check-panel-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.check-panel-head input,
.check-panel-item input{width:14px;height:14px;accent-color:var(--pri);cursor:pointer;flex:0 0 auto}
.target-check-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;align-items:start;position:relative;z-index:2}
.target-check-row .field{min-width:0;position:relative}
.target-check-row .label{margin-bottom:0}
.form-stack{display:flex;flex-direction:column;gap:16px}
.form-stack .field .control,
.form-stack .field .range-wrap,
.form-stack .field .duration-wrap{width:100%;box-sizing:border-box}
.config-row.hidden,.config-subrow.hidden{display:none !important}
.weekday-chips{display:flex;flex-wrap:wrap;gap:6px;min-height:34px;align-items:center}
.weekday-chips label{display:inline-flex;align-items:center;gap:4px;height:28px;padding:0 8px;border:1px solid var(--field-line);border-radius:6px;font-size:12px;color:#334155;cursor:pointer;user-select:none;background:#fff}
.weekday-chips label.is-on{border-color:var(--pri);background:var(--soft);color:var(--pri);font-weight:600}
.weekday-chips input{display:none}

.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:1000}
.modal-panel{width:min(760px,100%);max-height:86vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow-pop);margin:auto;flex-shrink:0}
.modal-head,.modal-foot{padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.modal-head{border-bottom:1px solid var(--line)}
.modal-foot{border-top:1px solid var(--line);justify-content:flex-end;gap:8px}
.modal-body{padding:18px}
.modal-close{border:none;background:transparent;font-size:14px;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:6px}
.modal-close:hover{color:var(--text);background:#f8fafc}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-grid>div{padding:12px;background:#f8fafc;border-radius:8px;border:1px solid #edf1f7}
.detail-grid span{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.confirm-text{line-height:1.8}
.page-toast{position:fixed;right:24px;bottom:24px;transform:translateY(10px);opacity:0;background:#fff;color:var(--text);padding:11px 14px;border-radius:8px;border:1px solid var(--line);box-shadow:0 10px 28px rgba(15,23,42,.14);z-index:1200;transition:.18s ease;font-size:13px;min-width:220px}
.page-toast.show{opacity:1;transform:translateY(0)}

.log-summary{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.log-summary span{font-size:13px;color:var(--muted)}
.log-table-wrap{border:1px solid #dfe5f0;border-radius:10px;overflow:hidden}
.log-table{width:100%;border-collapse:collapse}
.log-table th,.log-table td{padding:12px 14px;text-align:left;border-bottom:1px solid #edf1f7;white-space:normal}
.log-table th{background:var(--head-bg);color:#334155;font-weight:600}
.log-table tr:last-child td{border-bottom:none}

.body-actions{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:12px;flex-wrap:wrap}
.check-row{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:#334155;cursor:pointer;user-select:none}
.check-row input{width:16px;height:16px;accent-color:var(--pri);cursor:pointer}
.popup-panel{margin-top:14px;padding-top:14px;border-top:1px dashed #e2e8f0}
.popup-inline-panel{margin-top:0}
.popup-inline-panel.hidden{display:none !important}
.popup-inline-title{font-size:14px;font-weight:600;color:#1f2937;margin-bottom:12px}
.content-mode-tabs{display:flex;gap:8px;margin-bottom:14px}
.content-mode-tabs.hidden{display:none !important}
.content-mode-tab{height:32px;padding:0 14px;border:1px solid var(--field-line);background:#fff;border-radius:7px;color:#64748b;font-size:13px;cursor:pointer}
.content-mode-tab:hover{border-color:#c4d0e6;color:var(--text)}
.content-mode-tab.active{border-color:var(--pri);background:#eff4ff;color:var(--pri);font-weight:600}
.content-mode-tab:disabled{opacity:.45;cursor:not-allowed}
#bodyContentPanel.hidden{display:none !important}
.popup-preview{margin-top:12px;padding:12px;border:1px solid #dbe4ff;border-radius:10px;background:#f5f8ff}
.popup-preview .label{margin-bottom:6px;color:var(--pri)}
.popup-preview p{margin:0;white-space:pre-line;line-height:1.7;color:#334155;font-size:13px}
.preview-mode{display:flex;gap:8px;margin-top:12px}
.preview-mode-btn{flex:1;height:32px;border:1px solid var(--field-line);background:#fff;border-radius:7px;color:#64748b;font-size:13px;cursor:pointer}
.preview-mode-btn.active{border-color:var(--pri);background:#eff4ff;color:var(--pri);font-weight:600}
.preview-mode-btn:disabled{opacity:.45;cursor:not-allowed}
.preview-body-view{min-height:420px}
.article-view{background:#fff;border-radius:12px;padding:18px 16px;min-height:420px;box-shadow:0 2px 10px rgba(15,23,42,.06)}
.article-view .article-meta{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px;font-size:12px;color:#94a3b8}
.article-view .article-title{margin:0 0 14px;font-size:18px;line-height:1.45;font-weight:700;color:var(--text)}
.article-view .article-body{margin:0;white-space:pre-line;line-height:1.85;color:#334155;font-size:14px}
.article-view .article-title.is-placeholder,
.article-view .article-body.is-placeholder,
.popup-card-demo .popup-title.is-placeholder,
.popup-card-demo .popup-text.is-placeholder{color:#94a3b8;font-weight:400}
.article-view .article-time{margin-top:18px;padding-top:14px;border-top:1px solid #eef2f7;font-size:12px;color:#64748b;line-height:1.7;white-space:pre-line}
.preview-popup-view{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:20px 16px;box-sizing:border-box;background:rgba(15,23,42,.45);z-index:2}
.preview-popup-view.hidden{display:none !important}
.preview-body-view.hidden{display:none !important}
.popup-mask-demo{display:none}
.popup-card-demo{position:relative;z-index:1;width:100%;background:#fff;border-radius:14px;padding:18px 16px;box-shadow:0 12px 28px rgba(15,23,42,.2)}
.popup-card-demo .popup-title{font-size:15px;font-weight:700;margin:0 0 10px;color:var(--text)}
.popup-card-demo .popup-text{margin:0;white-space:pre-line;line-height:1.7;color:#4b5563;font-size:13px}
.popup-card-demo .popup-actions{display:flex;justify-content:flex-end;margin-top:16px}
.popup-card-demo .popup-actions .btn{height:30px;padding:0 14px;font-size:12px}
.footer-bar{margin-top:16px;padding:14px 18px;border:1px solid var(--line);border-radius:10px;background:#fff;display:flex;justify-content:center;gap:10px;box-shadow:0 6px 18px rgba(15,23,42,.04)}
.footer-bar.end{justify-content:flex-end}

.modal-mask.hidden{display:none !important}
@media(max-width:1000px){.layout{grid-template-columns:1fr}.preview{position:static}.target-check-row,.grid4{grid-template-columns:1fr 1fr}}
@media(max-width:720px){.grid2,.grid3,.grid4,.target-check-row{grid-template-columns:1fr}.page{padding:12px}.filter-actions{margin-left:0;width:100%}.name-filter,.project-filter,.status-filter,.date-filter{width:100%}.recurrence-inline .control{min-width:100%;flex:1 1 100%}.lang-sync-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.check-panel-body{grid-template-columns:repeat(2,minmax(0,1fr))}}
</style>
</head>
<body>
<div class="page">
  <header class="page-header">
    <h1>公告管理</h1>
    <span class="page-header-tz">当前基准时区为：GMT+3</span>
  </header>

  <section class="shell">
    <div class="meta-bar">
      <div class="meta-crumb">
        <span>工作台</span>
        <span class="meta-tag" id="metaTag">公告列表</span>
      </div>
    </div>
    <div class="shell-body">

<section id="listPage">
  <div class="filter-panel">
    <div class="filter-bar">
      <div class="filter-item name-filter">
        <input class="control" id="noticeNameFilter" placeholder="公告标题">
      </div>
      <div class="filter-item project-filter">
        <select class="control" id="projectFilter">
          <option>所属项目</option>
          <option>Dana</option>
          <option>TW</option>
        </select>
      </div>
      <div class="filter-item mode-filter">
        <select class="control" id="publishModeFilter">
          <option>发布方式</option>
          <option>立即发布</option>
          <option>预约发布</option>
          <option>循环发布</option>
        </select>
      </div>
      <div class="filter-item status-filter">
        <select class="control" id="statusFilter">
          <option>公告状态</option>
          <option>待发布</option>
          <option>展示中</option>
          <option>已下架</option>
          <option>已归档</option>
          <option>已取消</option>
        </select>
      </div>
      <div class="filter-item status-filter">
        <select class="control" id="cycleStatusFilter">
          <option>循环状态</option>
          <option>无循环</option>
          <option>循环中</option>
          <option>已终止</option>
        </select>
      </div>
      <div class="filter-item cycle-filter">
        <input class="control" id="cycleIdFilter" placeholder="公告ID">
      </div>
      <div class="filter-item date-range-filter">
        <div class="range-wrap">
          <input id="publishFrom" type="text" title="发布开始日期" placeholder="发布开始日期">
          <span class="range-mid">~</span>
          <input id="publishTo" type="text" title="发布结束日期" placeholder="发布结束日期">
        </div>
      </div>
      <div class="filter-item date-range-filter">
        <div class="range-wrap">
          <input id="createdFrom" type="text" title="创建开始日期" placeholder="创建开始日期">
          <span class="range-mid">~</span>
          <input id="createdTo" type="text" title="创建结束日期" placeholder="创建结束日期">
        </div>
      </div>
      <div class="filter-actions">
        <button class="btn ghost" type="button" onclick="resetNoticeFilters()">重置</button>
        <button class="btn primary" onclick="searchNotices()">查询</button>
      </div>
    </div>
  </div>
  <div class="list-actions">
    <button class="btn primary compact" onclick="openCreate()">＋ 新增公告</button>
    <button class="btn compact" onclick="showPage('templates')">公告模板</button>
  </div>
  <div class="table-wrap">
    <table class="data-table">
      <thead><tr><th>公告ID</th><th>公告标题</th><th>所属项目</th><th>发布方式</th><th>发布时间</th><th>到期时间</th><th>状态</th><th>循环状态</th><th>创建人</th><th>创建时间</th><th>操作</th></tr></thead>
      <tbody id="noticeRows"></tbody>
    </table>
  </div>
  <div class="list-pager" id="noticePager"></div>
</section>

<section id="editorPage" class="hidden">
  <div class="layout">
    <div class="stack">
      <div class="card">
        <div class="head"><div><div class="title" id="editorTitle">新增公告</div></div></div>
        <div class="body">
          <div class="form-stack">
            <!-- 第一行：投放对象 -->
            <div class="target-check-row" id="targetRow">
              <div class="field">
                <label class="label"><span class="req">*</span>投放项目</label>
                <select id="targetProject" class="control"><option value="Dana">Dana</option><option value="TW">TW</option></select>
              </div>
              <div class="field">
                <label class="label"><span class="req">*</span>投放 APP</label>
                <div class="check-panel" id="targetAppPanel">
                  <div class="check-panel-head" onclick="toggleCheckPanelExpand('targetAppPanel')">
                    <label class="check-panel-all-wrap" onclick="event.stopPropagation()">
                      <input class="check-panel-all" type="checkbox" checked onchange="toggleCheckPanelAll('targetAppPanel',this.checked)">全选
                    </label>
                    <span class="check-panel-summary" id="targetAppPanelSummary"></span>
                    <button type="button" class="check-panel-toggle" tabindex="-1">展开</button>
                  </div>
                  <div class="check-panel-body" id="targetAppOptions"></div>
                </div>
              </div>
              <div class="field">
                <label class="label"><span class="req">*</span>APP版本</label>
                <div class="check-panel" id="targetAppVersionPanel">
                  <div class="check-panel-head" onclick="toggleCheckPanelExpand('targetAppVersionPanel')">
                    <label class="check-panel-all-wrap" onclick="event.stopPropagation()">
                      <input class="check-panel-all" type="checkbox" checked onchange="toggleCheckPanelAll('targetAppVersionPanel',this.checked)">全选
                    </label>
                    <span class="check-panel-summary" id="targetAppVersionPanelSummary"></span>
                    <button type="button" class="check-panel-toggle" tabindex="-1">展开</button>
                  </div>
                  <div class="check-panel-body" id="targetAppVersionOptions"></div>
                </div>
              </div>
              <div class="field">
                <label class="label"><span class="req">*</span>地区选择</label>
                <div class="check-panel" id="targetRegionPanel">
                  <div class="check-panel-head" onclick="toggleCheckPanelExpand('targetRegionPanel')">
                    <label class="check-panel-all-wrap" onclick="event.stopPropagation()">
                      <input class="check-panel-all" type="checkbox" checked onchange="toggleCheckPanelAll('targetRegionPanel',this.checked)">ALL
                    </label>
                    <span class="check-panel-summary" id="targetRegionPanelSummary"></span>
                    <button type="button" class="check-panel-toggle" tabindex="-1">展开</button>
                  </div>
                  <div class="check-panel-body" id="targetRegionOptions"></div>
                </div>
              </div>
            </div>

            <!-- 第二行：发布方式 / 有效期 / 动态字段 -->
            <div class="grid4 config-row" id="publishConfigRow">
              <div class="field">
                <label class="label"><span class="req">*</span>发布方式</label>
                <select id="publishMode" class="control" onchange="onPublishConfigChange()">
                  <option value="immediate" selected>立即发布</option>
                  <option value="scheduled">预约发布</option>
                  <option value="recurring">循环发布</option>
                </select>
              </div>
              <div class="field">
                <label class="label"><span class="req">*</span>公告有效期</label>
                <select id="validityType" class="control" onchange="onPublishConfigChange()"></select>
              </div>
              <div class="field hidden" id="scheduleStartField">
                <label class="label"><span class="req">*</span>预约发布时间</label>
                <input id="eventStartTime" class="control" type="datetime-local" value="2026-07-20T09:00" onfocus="this.dataset.previous=this.value" onchange="onCoreTimeChange(this)">
              </div>
              <div class="field" id="expireTimeField">
                <label class="label"><span class="req">*</span>到期时间</label>
                <input id="eventEndTime" class="control" type="datetime-local" value="2026-07-20T10:00" onfocus="this.dataset.previous=this.value" onchange="onCoreTimeChange(this)">
              </div>
              <div class="field hidden" id="recurrenceTypeField">
                <label class="label"><span class="req">*</span>循环规则</label>
                <select id="recurrenceType" class="control" onchange="onPublishConfigChange()">
                  <option value="daily" selected>每日</option>
                  <option value="weekly">每周</option>
                  <option value="monthly">每月</option>
                </select>
              </div>
              <div class="field hidden" id="weeklyDaysField">
                <label class="label"><span class="req">*</span>执行星期</label>
                <select id="weeklyExecDay" class="control" onchange="onPublishConfigChange()">
                  <option value="1" selected>周一</option>
                  <option value="2">周二</option>
                  <option value="3">周三</option>
                  <option value="4">周四</option>
                  <option value="5">周五</option>
                  <option value="6">周六</option>
                  <option value="0">周日</option>
                </select>
              </div>
              <div class="field hidden" id="monthlyDayField">
                <label class="label"><span class="req">*</span>执行日期</label>
                <select id="monthlyExecDay" class="control" onchange="onPublishConfigChange()"></select>
              </div>
            </div>

            <!-- 第三行：循环配置 -->
            <div class="grid4 config-subrow hidden" id="recurrenceRow1">
              <div class="field">
                <label class="label"><span class="req">*</span>循环开始日期</label>
                <input id="loopStartDate" class="control" type="date" value="2026-07-20" onchange="onPublishConfigChange()">
              </div>
              <div class="field">
                <label class="label"><span class="req">*</span>每次发布时间</label>
                <input id="recurrenceStartTime" class="control" type="time" step="60" value="09:00" onchange="onPublishConfigChange()">
              </div>
              <div class="field hidden" id="displayDurationField">
                <label class="label"><span class="req">*</span>每次展示时长</label>
                <div class="duration-wrap">
                  <input id="displayDurationValue" class="control num" type="number" min="1" value="1" onchange="onPublishConfigChange()">
                  <span class="duration-unit-text">天</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="head">
          <div><div class="title">公告内容</div></div>
        </div>
        <div class="body" style="padding-bottom:12px">
          <div class="form-stack">
            <div class="grid2">
              <div class="field"><label class="label">公告模板</label><select id="editorTplSelect" class="control" onchange="applyTemplateFromEditor(this.value)"><option value="">不使用模板</option></select></div>
              <div class="field">
                <label class="label"><span class="req">*</span>展示形式</label>
                <select id="displayFormat" class="control" onchange="onDisplayFormatChange()">
                  <option value="body_only" selected>仅公告正文</option>
                  <option value="body_popup">公告正文 + 弹窗</option>
                </select>
              </div>
            </div>
            <div id="popupSettingsRow" class="grid2 hidden">
              <div class="field">
                <label class="label"><span class="req">*</span>弹窗结束方式</label>
                <select id="popupEndMode" class="control" onchange="onPopupConfigChange()">
                  <option value="follow_expire" selected>跟随公告到期</option>
                  <option value="custom">指定时间</option>
                </select>
              </div>
              <div class="field hidden" id="popupEndTimeField">
                <label class="label"><span class="req">*</span>弹窗结束时间</label>
                <input id="popupEndTime" class="control" type="datetime-local" value="2026-07-20T10:00">
              </div>
            </div>
          </div>
        </div>
        <div class="lang-toolbar">
          <div class="tabs" id="editorLangTabs"></div>
          <div class="head-actions">
            <button class="btn ghost compact" type="button" onclick="openLangSync('notice')">同步</button>
            <button class="btn compact" type="button" onclick="openParamManager('notice')">参数管理</button>
          </div>
        </div>
        <div class="body">
          <div class="field"><label class="label"><span class="req">*</span>公告标题</label><input id="titleInput" class="control" placeholder="请填写公告标题（正文与弹窗共用）"></div>
          <div style="height:14px"></div>
          <div class="content-mode-tabs hidden" id="contentModeTabs">
            <button type="button" class="content-mode-tab active" id="contentModeBodyTab" onclick="setContentEditMode('body')">公告正文</button>
            <button type="button" class="content-mode-tab" id="contentModePopupTab" onclick="setContentEditMode('popup')">弹窗内容</button>
          </div>
          <div id="bodyContentPanel">
            <div class="field">
              <label class="label"><span class="req">*</span>公告正文</label>
              <div class="tokens" id="tokenBar" style="margin:0 0 10px"></div>
              <textarea id="bodyInput" class="control" placeholder="请输入公告正文"></textarea>
            </div>
          </div>
          <div id="popupConfigPanel" class="popup-inline-panel hidden">
            <div class="field">
              <label class="label"><span class="req">*</span>弹窗展示内容</label>
              <div class="tokens" id="popupTokenBar" style="margin:0 0 10px"></div>
              <textarea id="popupInput" class="control" placeholder="请输入弹窗展示内容，可插入参数"></textarea>
            </div>
          </div>
        </div>
      </div>

    </div>

    <aside class="card preview">
      <div class="head"><div><div class="title">用户端预览</div></div></div>
      <div class="body" style="padding-bottom:0">
        <div class="preview-mode" id="previewModeBar">
          <button type="button" class="preview-mode-btn active" id="previewModeBodyBtn" onclick="setPreviewMode('body')">公告正文预览</button>
          <button type="button" class="preview-mode-btn" id="previewModePopupBtn" onclick="setPreviewMode('popup')" disabled title="请先选择「公告正文 + 弹窗」">弹窗预览</button>
        </div>
      </div>
      <div class="phone">

        <div class="phoneBody">
          <div id="previewBodyView" class="preview-body-view">
            <div class="article-view">
              <h3 class="article-title" id="previewTitle"></h3>
              <p class="article-body" id="previewBody"></p>
            </div>
          </div>
          <div id="previewPopupView" class="preview-popup-view hidden">
            <div class="popup-mask-demo"></div>
            <div class="popup-card-demo">
              <div class="popup-title" id="previewPopupTitle">弹窗预览</div>
              <p class="popup-text" id="previewPopup"></p>
              <div class="popup-actions"><button type="button" class="btn primary compact">我知道了</button></div>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>
  <div class="footer-bar">
    <button class="btn ghost" onclick="cancelEdit()">取消</button>
    <button class="btn primary compact" onclick="saveNotice()">保存</button>
  </div>
</section>

<section id="templatesPage" class="hidden">

  </div>

<script>
const LANGS=[
  {code:'en',name:'英文',locale:'en-GB'},
  {code:'zhHant',name:'繁体中文',locale:'zh-TW'},
  {code:'id',name:'印尼',locale:'id-ID'},
  {code:'vi',name:'越南',locale:'vi-VN'},
  {code:'enIN',name:'印度英文',locale:'en-IN'},
  {code:'fil',name:'菲律宾',locale:'fil-PH'},
  {code:'es',name:'西班牙语',locale:'es-ES'},
  {code:'pt',name:'葡萄牙语',locale:'pt-BR'},
  {code:'th',name:'泰国',locale:'th-TH'}
];
const DEFAULT_LANG='en';
const langNames=Object.fromEntries(LANGS.map(l=>[l.code,l.name]));
const langLocales=Object.fromEntries(LANGS.map(l=>[l.code,l.locale]));

function emptyCopy(){
  return Object.fromEntries(LANGS.map(l=>[l.code,{title:'',body:'',popup:''}]));
}
function ensureCopy(src){
  const out=emptyCopy();
  LANGS.forEach(({code})=>{
    const c=src&&src[code]?src[code]:{};
    out[code]={title:c.title||'',body:c.body||'',popup:c.popup||''};
  });
  return out;
}
function buildLangTabsHtml(activeCode,attr='data-lang',extraClass=''){
  return LANGS.map(l=>`<button type="button" class="tab${extraClass?(' '+extraClass):''}${l.code===activeCode?' active':''}" ${attr}="${l.code}">${l.name}</button>`).join('');
}
function buildLangOptionsHtml(activeCode){
  return LANGS.map(l=>`<option value="${l.code}"${l.code===activeCode?' selected':''}>${l.name}</option>`).join('');
}
function primaryCopyTitle(c){
  if(!c)return '';
  return (c.zhHant?.title||c.en?.title||LANGS.map(l=>c[l.code]?.title).find(t=>t&&t.trim())||'').trim();
}
function findMissingLang(copyObj,fields){
  return LANGS.find(({code})=>{
    const c=copyObj[code]||{};
    return fields.some(f=>!(c[f]||'').trim());
  })||null;
}

function sampleMaintCopy(){
  return ensureCopy({
    en:{title:'System Maintenance Notice',body:'Dear ${name}, system maintenance will begin at ${start_time} and is expected to end at ${end_time}. Full service resumes at ${resume_time}.',popup:''},

function syncCoreTimesFromConfig(){
  const mode=publishMode?.value||'immediate';
  const validity=validityType?.value||'limited';
  if(mode==='immediate'){
    syncImmediatePublishTime();
    if(validity==='permanent'){
      if(eventEndTime) eventEndTime.value='2099-12-31T23:59';
    }
    return;
  }
  if(mode==='scheduled'){
    if(validity==='permanent'&&eventStartTime?.value){
      if(eventEndTime) eventEndTime.value='2099-12-31T23:59';
    }
    return;
  }
  // recurring
  const st=formatClock(recurrenceStartTime?.value||'09:00');
  const startDate=loopStartDate?.value||fmtInput(new Date(),baseTz).slice(0,10);
  let startDT=`${startDate}T${st}`;
  if(eventStartTime) eventStartTime.value=startDT;
  if(validity==='permanent'){
    if(eventEndTime) eventEndTime.value='2099-12-31T23:59';
    return;
  }
  if(validity==='until_next'){
    // 持续到下一次：按循环周期给一个占位结束时间，便于状态计算
    const type=recurrenceType?.value||'daily';
    let endDate=startDate;
    if(type==='weekly') endDate=addCalendarDays(startDate,7);
    else if(type==='monthly') endDate=addCalendarDays(startDate,30);
    else endDate=addCalendarDays(startDate,1);
    if(eventEndTime) eventEndTime.value=`${endDate}T${st}`;
    return;
  }
  const mins=durationToMinutes(displayDurationValue?.value,'day');
  if(eventEndTime) eventEndTime.value=addMinutesToInput(startDT,mins);
}
function onPublishConfigChange(){

function onPopupConfigChange(){

function recurrenceSummary(){
  if(publishMode.value!=='recurring')return '';
  const st=formatClock(recurrenceStartTime?.value);
  const type=recurrenceType.value;
  const validity=validityType?.value;
  const dur=validity==='fixed_duration'
    ?`${displayDurationValue?.value||1}天`
    :(validity==='permanent'?'长期有效':'持续到下一次');
  if(type==='daily') return `每日 ${st} · ${dur}`;
  if(type==='weekly'){
    const days=weekdayLabel(getWeeklyDay());
    return `每周 ${days||'未选'} ${st} · ${dur}`;
  }
  const day=monthlyExecDay?.value==='last'?'最后一天':`${monthlyExecDay?.value||''}日`;
  return `每月${day} ${st} · ${dur}`;
}

function validateNotice(){
  if(!targetProject.value)return '请选择投放项目';
  if(!getCheckedValues('targetAppPanel').length)return '请选择投放 APP';
  if(!getCheckedValues('targetAppVersionPanel').length)return '请选择 APP 版本';
  if(!getCheckedValues('targetRegionPanel').length)return '请选择地区';
  const mode=publishMode.value;
  const validity=validityType?.value||'';
  if(mode==='recurring'){
    if(!loopStartDate?.value)return '请选择循环开始日期';
    if(!recurrenceStartTime?.value)return '请填写每次发布时间';
    if(recurrenceType.value==='weekly'&&(weeklyExecDay?.value===''||weeklyExecDay?.value==null))return '请选择执行星期';
    if(recurrenceType.value==='monthly'&&!monthlyExecDay?.value)return '请选择执行日期';
    if(validity==='fixed_duration'){
      if(!displayDurationValue?.value||Number(displayDurationValue.value)<=0)return '请填写每次展示时长';
    }
  }else if(mode==='immediate'){
    if(validity==='limited'){
      if(!eventEndTime.value)return '请填写到期时间';
      syncImmediatePublishTime();
      const start=parse(eventStartTime.value,baseTz),end=parse(eventEndTime.value,baseTz);
      if(end<=start)return '到期时间必须晚于当前发布时间';
    }
  }else{
    if(!eventStartTime.value)return '请填写预约发布时间';
    if(validity==='limited'){
      if(!eventEndTime.value)return '请填写到期时间';
      const start=parse(eventStartTime.value,baseTz),end=parse(eventEndTime.value,baseTz);
      if(end<=start)return '到期时间必须晚于预约发布时间';
    }
  }
  const missingTitle=findMissingLang(copy,['title']);
  if(missingTitle){setLang(missingTitle.code);return '请完善 '+missingTitle.name+' 的公告标题';}
  const missingBody=findMissingLang(copy,['body']);
  if(missingBody){setLang(missingBody.code);return '请完善 '+missingBody.name+' 的公告正文';}
  if(enablePopupDisplay){
    const missing=findMissingLang(copy,['popup']);
    if(missing){setLang(missing.code);return '已选择弹窗展示，请完善 '+missing.name+' 的弹窗展示内容';}
    const endMode=document.getElementById('popupEndMode')?.value||popupEndMode?.value;
    const endTime=document.getElementById('popupEndTime')?.value||popupEndTime?.value;
    if(endMode==='custom'&&!endTime)return '请填写弹窗结束时间';
    if(validity==='permanent'&&endMode==='follow_expire')return '长期有效公告不能选择跟随公告到期';
  }
  return '';
}
function fmtListTime(v){
  if(!v) return '—';
  return v.replace('T',' ');
}
function buildNoticeFromEditor(title){
  syncCoreTimesFromConfig();
  const mode=publishMode.value==='recurring'?'循环发布':(publishMode.value==='immediate'?'立即发布':'预约发布');
  const validity=validityType?.value||'';
  const status=calcStatus();
  const publishTime=fmtListTime(eventStartTime?.value)||currentCreatedAt();
  const expireTime=validity==='permanent'||validity==='until_next'
    ?(validity==='until_next'?'下次发布前':'长期有效')
    :(fmtListTime(eventEndTime?.value)||'—');
  const baseId=nextBaseId();
  const record={
    noticeId:baseId,
    baseId,
    name:title,
    project:targetProject.value,
    publishMode:mode,
    publishTime,
    expireTime,
    cycleId:'',
    cycleSummary:'',
    period:0,
    status,
    creator:'Admin',
    createdAt:currentCreatedAt()
  };
  if(mode==='循环发布'){
    const summary=(recurrenceSummary()||'循环规则').replace(/\s*·\s*.*$/,'');
    cycleRules[baseId]={
      summary,
      detail:recurrenceSummary()+' '+BASE_TZ_LABEL,
      duration:validity==='permanent'?'长期有效':(validity==='until_next'?'持续到下一次发布':`${displayDurationValue?.value||1}天`),
      terminated:false,
      nextPeriod:1,
      creator:'Admin',
      createdAt:record.createdAt
    };
    const period=allocateCyclePeriod(baseId);
    record.cycleId=baseId;
    record.cycleSummary=summary;
    record.period=period;
    record.noticeId=makeNoticeId(baseId,period);
    record.status='展示中';
  }
  return record;
}
function saveNotice(){
  saveCopy();
  const error=validateNotice();if(error){alert(error);return}
  let title=primaryCopyTitle(copy);if(!title){alert('请填写公告标题');return}
  const usesTime=Object.values(copy).some(c=>/\$\{[a-zA-Z0-9_]+\}/.test(c.body));
  if(!usesTime&&!confirm('多语言正文中未引用任何参数，确认继续保存吗？'))return;
  if(editing&&editingNoticeId){
    const exist=getNoticeById(editingNoticeId);
    if(exist){
      syncCoreTimesFromConfig();
      const validity=validityType?.value||'';
      exist.name=title;
      exist.project=targetProject.value;
      exist.publishTime=fmtListTime(eventStartTime?.value)||exist.publishTime;
      exist.expireTime=validity==='permanent'||validity==='until_next'
        ?(validity==='permanent'?'长期有效':'下次发布前')
        :(fmtListTime(eventEndTime?.value)||exist.expireTime);
      if(exist.status==='待发布'||exist.status==='展示中'){
        const nextStatus=calcStatus();
        if(nextStatus==='待发布'||nextStatus==='展示中'||nextStatus==='已归档') exist.status=nextStatus;
      }
      editingNoticeId=null;
      editing=false;
      editingPublished=false;
      showPage('list');
      renderNoticeList(false);
      showToast('公告已更新，修改已实时生效');
      return;
    }
  }
  if(!editing){
    noticeRecords.push(buildNoticeFromEditor(title));
  }
  editingNoticeId=null;
  editing=false;
  editingPublished=false;
  showPage('list');
  renderNoticeList(false);
  showToast(publishMode.value==='recurring'
    ?'循环规则已保存，已生成当前期公告记录'
    :'公告已保存，所有时间将以统一时间戳存储');
}

function sortNoticeRecords(list){
  // 默认按创建时间倒序（最新创建在前）
  return list.slice().sort((a,b)=>{
    const ca=a.createdAt||'';
    const cb=b.createdAt||'';
    if(ca!==cb) return cb.localeCompare(ca);
    return (b.noticeId||'').localeCompare(a.noticeId||'');
  });
}
function matchNoticeFilters(n){
  const keyword=(document.getElementById('noticeNameFilter')?.value||'').trim().toLowerCase();
  const project=document.getElementById('projectFilter')?.value||'所属项目';
  const mode=document.getElementById('publishModeFilter')?.value||'发布方式';
  const status=document.getElementById('statusFilter')?.value||'公告状态';
  const cycleStatus=document.getElementById('cycleStatusFilter')?.value||'循环状态';
  const idKeyword=(document.getElementById('cycleIdFilter')?.value||'').trim().toLowerCase();
  const publishFrom=document.getElementById('publishFrom')?.value||'';
  const publishTo=document.getElementById('publishTo')?.value||'';
  const createdFrom=document.getElementById('createdFrom')?.value||'';
  const createdTo=document.getElementById('createdTo')?.value||'';
  const pubDay=(n.publishTime||'').slice(0,10);
  const createdDay=(n.createdAt||'').slice(0,10);
  if(keyword&&!(n.name||'').toLowerCase().includes(keyword)) return false;
  if(project!=='所属项目'&&n.project!==project) return false;
  if(mode!=='发布方式'&&n.publishMode!==mode) return false;
  if(status!=='公告状态'&&n.status!==status) return false;
  if(cycleStatus!=='循环状态'&&getCycleStatus(n)!==cycleStatus) return false;
  if(idKeyword){
    const nid=(n.noticeId||'').toLowerCase();
    const bid=(n.baseId||n.cycleId||'').toLowerCase();
    if(!nid.includes(idKeyword)&&!bid.includes(idKeyword)) return false;
  }
  if(publishFrom&&pubDay<publishFrom) return false;
  if(publishTo&&pubDay>publishTo) return false;
  if(createdFrom&&createdDay<createdFrom) return false;
  if(createdTo&&createdDay>createdTo) return false;
  return true;
}
function renderNoticePager(total,page,pageCount){
  const pager=document.getElementById('noticePager');
  if(!pager)return;
  if(total===0){
    pager.innerHTML='<div class="list-pager-info">共 0 条</div>';
    return;
  }
  const start=(page-1)*NOTICE_PAGE_SIZE+1;
  const end=Math.min(page*NOTICE_PAGE_SIZE,total);
  let pages='';
  const maxButtons=7;
  let from=Math.max(1,page-Math.floor(maxButtons/2));
  let to=Math.min(pageCount,from+maxButtons-1);
  from=Math.max(1,to-maxButtons+1);
  for(let i=from;i<=to;i++){
    pages+=`<button type="button" class="pager-btn${i===page?' active':''}" onclick="goNoticePage(${i})">${i}</button>`;
  }
  pager.innerHTML=`
    <div class="list-pager-info">共 ${total} 条，第 ${start}-${end} 条</div>
    <button type="button" class="pager-btn" onclick="goNoticePage(${page-1})" ${page<=1?'disabled':''}>上一页</button>
    ${pages}
    <button type="button" class="pager-btn" onclick="goNoticePage(${page+1})" ${page>=pageCount?'disabled':''}>下一页</button>`;
}
function goNoticePage(page){
  const list=sortNoticeRecords(noticeRecords.filter(matchNoticeFilters));
  const pageCount=Math.max(1,Math.ceil(list.length/NOTICE_PAGE_SIZE));
  noticePage=Math.min(Math.max(1,page),pageCount);
  renderNoticeList(false);
}
function renderNoticeList(showResultToast,resetPage){
  const publishFrom=document.getElementById('publishFrom')?.value||'';
  const publishTo=document.getElementById('publishTo')?.value||'';
  const createdFrom=document.getElementById('createdFrom')?.value||'';
  const createdTo=document.getElementById('createdTo')?.value||'';
  if(publishFrom&&publishTo&&publishFrom>publishTo){
    if(showResultToast) showToast('发布开始日期不能晚于结束日期');
    return;
  }
  if(createdFrom&&createdTo&&createdFrom>createdTo){
    if(showResultToast) showToast('创建开始日期不能晚于结束日期');
    return;
  }
  const rows=document.getElementById('noticeRows');
  if(!rows)return;
  if(resetPage) noticePage=1;
  const list=sortNoticeRecords(noticeRecords.filter(matchNoticeFilters));
  const pageCount=Math.max(1,Math.ceil(list.length/NOTICE_PAGE_SIZE)||1);
  if(noticePage>pageCount) noticePage=pageCount;
  if(noticePage<1) noticePage=1;
  const start=(noticePage-1)*NOTICE_PAGE_SIZE;
  const pageList=list.slice(start,start+NOTICE_PAGE_SIZE);
  rows.innerHTML=pageList.length
    ?pageList.map(n=>`<tr data-id="${n.noticeId}" data-status="${n.status}" data-base-id="${n.baseId||''}" data-cycle-id="${n.cycleId||''}">${buildNoticeRow(n)}</tr>`).join('')
    :`<tr><td colspan="11" style="text-align:center;color:#94a3b8;padding:28px 12px">暂无公告数据</td></tr>`;
  renderNoticePager(list.length,noticePage,pageCount);
  if(showResultToast) showToast(list.length?`查询完成，共 ${list.length} 条结果`:'未查询到匹配公告');
}

function editFutureCycle(button){
  const n=getNoticeFromButton(button);
  if(!n?.cycleId)return;
  const rule=cycleRules[n.cycleId];
  if(!rule){showToast('未找到循环规则');return;}
  if(rule.terminated){showToast('该循环已终止，无法修改');return;}
  if(modalPanel) modalPanel.style.width='min(520px,100%)';
  const body=`
    <div class="confirm-text" style="margin-bottom:12px">修改后续循环只影响<strong>尚未生成</strong>的公告，已生成历史与当前展示中的记录不会变更。</div>
    <div class="field"><label class="label">循环规则摘要</label><input id="futureCycleSummary" class="control" value="${rule.summary||''}"></div>
    <div class="field" style="margin-top:12px"><label class="label">展示时长</label><input id="futureCycleDuration" class="control" value="${rule.duration||''}"></div>
    <div class="field" style="margin-top:12px"><label class="label">规则详情</label><textarea id="futureCycleDetail" class="control" style="height:90px">${rule.detail||''}</textarea></div>`;
  openModal('修改后续循环',n.baseId||n.cycleId,body,'保存修改',()=>{
    const summary=document.getElementById('futureCycleSummary')?.value.trim();
    const duration=document.getElementById('futureCycleDuration')?.value.trim();
    const detail=document.getElementById('futureCycleDetail')?.value.trim();
    if(!summary){alert('请填写循环规则摘要');return;}
    rule.summary=summary;
    rule.duration=duration||rule.duration;
    rule.detail=detail||rule.detail;
    closeModal();

function terminateCycle(button){
  const n=getNoticeFromButton(button);
  if(!n?.cycleId||n.publishMode!=='循环发布')return;
  const rule=cycleRules[n.cycleId];
  if(rule?.terminated){showToast('该循环已终止');return;}

  openModal(
    '终止循环',
    '',
    `<div class="confirm-text">确认终止循环“${n.cycleSummary||n.baseId||n.cycleId}”吗？终止后<strong>不再生成后续公告</strong>，当前记录的公告状态不变、不会自动下架，已生成的历史记录将保留。</div>`,

/* ========== 公告参数（弹窗维护，列表内联编辑；公告/模板共用） ========== */
function getActiveParams(){
  return paramSource==='template'?templateDraftParams:noticeParams;
}

function refreshActiveParamUI(){
  if(paramSource==='template'){
    renderTemplateTokenBars();
    renderTemplatePreview();
  }else{
    renderTokenBar();
    renderPreview();
  }
}

function buildParamRowsHtml(){
  const list=getActiveParams();
  const rows=list.map((p,i)=>{
    const np=normalizeParam(p);
    if(paramEditIndex===i) return buildParamEditRowHtml(np,i);
    const ops=isFixedParam(np)
      ?`<span style="color:var(--muted);font-size:12px">不可修改</span>`
      :`<div class="icon-actions">
        <button class="btn compact" onclick="editNoticeParam(${i})">编辑</button>
        <button class="btn compact" onclick="deleteNoticeParam(${i})">删除</button>
      </div>`;
    return `<tr>
      <td class="mono">${paramToken(np.name)}</td>
      <td>${np.desc||'—'}</td>
      <td><span class="pill">${paramTypeLabel(np.type,np.precision)}</span></td>
      <td>${formatParamTableValue(np)}</td>
      <td>${ops}</td>
    </tr>`;
  }).join('');

  const creating=paramEditIndex===-1?buildParamEditRowHtml({name:'',desc:'',type:'',precision:'',value:''},-1):'';
  const addRow=paramEditIndex===null
    ?`<tr><td colspan="5" style="text-align:center;padding:12px"><button class="btn" type="button" onclick="addNoticeParam()">＋ 新增</button></td></tr>`
    :'';
  return (rows||'')+creating+addRow;
}

function buildParamValueInputsHtml(p){
  const type=p.type||'';
  const precision=p.precision||'';
  if(!type){
    return `<span style="color:var(--muted);font-size:12px">请先选择参数类型</span>`;
  }
  if(!precision){
    return `<span style="color:var(--muted);font-size:12px">请选择日期 / 日期时间 / 时间</span>`;
  }
  const inputType=paramInputType(precision);
  if(type==='time_range'){
    return `<div class="param-range">
      <input id="npStart" class="control" type="${inputType}" value="${p.start||''}" style="height:34px">
      <span class="range-mid">~</span>
      <input id="npEnd" class="control" type="${inputType}" value="${p.end||''}" style="height:34px">
    </div>`;
  }
  return `<input id="npTime" class="control" type="${inputType}" value="${p.value||''}" style="height:34px">`;
}

function buildParamPrecisionOptions(precision){
  return `
    <option value="" ${!precision?'selected':''}>请选择精度</option>
    <option value="date" ${precision==='date'?'selected':''}>日期</option>
    <option value="datetime" ${precision==='datetime'?'selected':''}>日期时间</option>
    <option value="time" ${precision==='time'?'selected':''}>时间</option>
  `;
}

function buildParamEditRowHtml(p,i){
  const type=p.type||'';
  const precision=p.precision||'';
  return `<tr style="background:#fffbeb">
    <td><input id="npName" class="control" placeholder="例如 start_time" value="${p.name||''}" style="height:34px"></td>
    <td><input id="npDesc" class="control" placeholder="参数说明" value="${p.desc||''}" style="height:34px"></td>
    <td>
      <div class="param-type-stack">
        <select id="npType" class="control" style="height:34px" onchange="toggleInlineParamType()">
          <option value="" ${!type?'selected':''}>请选择类型</option>
          <option value="time" ${type==='time'?'selected':''}>时间</option>
          <option value="time_range" ${type==='time_range'?'selected':''}>时间区间</option>
        </select>
        <select id="npPrecision" class="control" style="height:34px" ${type?'':'disabled'} onchange="toggleInlineParamPrecision()">
          ${buildParamPrecisionOptions(precision)}
        </select>
      </div>
    </td>
    <td id="npValueCell">${buildParamValueInputsHtml(p)}</td>
    <td><div class="icon-actions">
      <button class="btn primary compact" onclick="saveInlineParam(${i})">保存</button>
      <button class="btn ghost compact" onclick="cancelInlineParam()">取消</button>
    </div></td>
  </tr>`;
}

function refreshInlineParamValueCell(clearValues=true){
  const type=document.getElementById('npType')?.value||'';
  const precision=document.getElementById('npPrecision')?.value||'';
  const cell=document.getElementById('npValueCell');
  if(!cell)return;
  const base=clearValues
    ?{type,precision,value:'',start:'',end:''}
    :{type,precision,value:document.getElementById('npTime')?.value||'',start:document.getElementById('npStart')?.value||'',end:document.getElementById('npEnd')?.value||''};
  cell.innerHTML=buildParamValueInputsHtml(base);
}

function toggleInlineParamType(){
  const type=document.getElementById('npType')?.value||'';
  const precisionSel=document.getElementById('npPrecision');
  if(precisionSel){
    precisionSel.disabled=!type;
    if(!type) precisionSel.value='';
    else if(!precisionSel.value) precisionSel.value='datetime';
  }
  refreshInlineParamValueCell(true);
}

function toggleInlineParamPrecision(){
  refreshInlineParamValueCell(true);
}

function renderTokenBar(){
  const html=noticeParams.length
    ?noticeParams.map(p=>`<button class="token" onclick="insertToken('${paramToken(p.name)}','body')" title="${paramToken(p.name)}">${p.desc||p.name}</button>`).join('')
    :'<span style="color:var(--muted);font-size:12px">请先在参数管理中新增参数</span>';

    ?noticeParams.map(p=>`<button class="token" onclick="insertToken('${paramToken(p.name)}','popup')" title="${paramToken(p.name)}">${p.desc||p.name}</button>`).join('')

function openParamManager(source){
  if(source==='template'||source==='notice') paramSource=source;
  paramManagerOpen=true;
  modalPanel.style.width='min(980px,100%)';
  const body=`
    <div class="log-table-wrap">
      <table class="log-table">
        <thead><tr><th style="width:140px">参数名称</th><th style="width:110px">参数说明</th><th style="width:150px">参数类型</th><th>参数值</th><th style="width:160px">操作</th></tr></thead>
        <tbody>${buildParamRowsHtml()}</tbody>
      </table>
    </div>`;
  openModal(paramSource==='template'?'模板参数管理':'参数管理','',body);
  document.getElementById('modalFoot')?.classList.add('hidden');
}

function readInlineParamForm(){
  const name=(document.getElementById('npName')?.value||'').trim().replace(/[{}\s]/g,'');
  if(!name){showToast('请填写参数名称');return null;}
  const desc=(document.getElementById('npDesc')?.value||'').trim();
  const type=document.getElementById('npType')?.value||'';
  if(!type){showToast('请先选择参数类型');return null;}
  const precision=document.getElementById('npPrecision')?.value||'';
  if(!precision){showToast('请选择日期 / 日期时间 / 时间');return null;}
  if(type==='time'){
    let value=document.getElementById('npTime')?.value||'';
    if(precision==='time') value=value.slice(0,5);
    if(!value){showToast(precision==='date'?'请填写参数日期':'请填写参数时间');return null;}
    return {name,desc,type,precision,value};
  }
  let start=document.getElementById('npStart')?.value||'';
  let end=document.getElementById('npEnd')?.value||'';
  if(precision==='time'){start=start.slice(0,5);end=end.slice(0,5);}
  if(!start||!end){
    showToast(precision==='date'?'请填写日期区间':precision==='time'?'请填写时间区间':'请填写日期时间区间');
    return null;
  }
  if(precision==='time'){
    if(start===end){showToast('结束时间不能与开始时间相同');return null;}
  }else if(end<=start){
    showToast('结束值必须晚于开始值');
    return null;
  }
  return {name,desc,type,precision,start,end};
}

function addNoticeParam(){
  if(paramEditIndex!==null){showToast('请先完成当前参数编辑');return;}
  paramEditIndex=-1;
  openParamManager(paramSource);
  setTimeout(()=>document.getElementById('npType')?.focus(),30);
}

function editNoticeParam(i){
  if(paramEditIndex!==null){showToast('请先完成当前参数编辑');return;}
  const p=getActiveParams()[i];
  if(isFixedParam(p)){showToast('固定参数不可修改');return;}
  paramEditIndex=i;
  openParamManager(paramSource);
  setTimeout(()=>document.getElementById('npName')?.focus(),30);
}

function saveInlineParam(i){
  const p=readInlineParamForm();
  if(!p)return;
  if(FIXED_PARAM_NAMES.has(p.name)){showToast('name 为固定参数，不可占用');return;}
  const list=getActiveParams();
  if(i===-1){
    if(list.some(x=>x.name===p.name)){showToast('参数名称已存在');return;}
    list.push(p);
    showToast('参数已新增，可在正文中插入 '+paramToken(p.name));
  }else{
    if(isFixedParam(list[i])){showToast('固定参数不可修改');return;}
    if(list.some((x,idx)=>idx!==i&&x.name===p.name)){showToast('参数名称已存在');return;}
    list[i]=p;
    showToast('参数已更新');
  }
  paramEditIndex=null;
  openParamManager(paramSource);
  refreshActiveParamUI();
}

function cancelInlineParam(){
  paramEditIndex=null;
  openParamManager(paramSource);
}

function deleteNoticeParam(i){
  if(paramEditIndex!==null){showToast('请先完成当前参数编辑');return;}
  const p=getActiveParams()[i];
  if(isFixedParam(p)){showToast('固定参数不可删除');return;}
  getActiveParams().splice(i,1);
  openParamManager(paramSource);
  refreshActiveParamUI();
  showToast('参数已删除');
}

  const isOn=enabled!==false;
  return `<div class="icon-actions">
    <label class="shelf-action" title="${isOn?'停用模板':'启用模板'}">
      <span class="shelf-switch"><input type="checkbox" ${isOn?'checked':''} onchange="toggleTemplateEnabled(${id},this)"><span class="shelf-slider"></span></span>

function toggleTemplateEnabled(id,input){
  const t=templates.find(x=>x.id===id);
  if(!t||!input)return;
  const willEnable=input.checked;
  const action=willEnable?'启用':'停用';
  input.checked=!willEnable;
  if(modalPanel) modalPanel.style.width='min(420px,100%)';
  openModal(
    `确认${action}模板`,
    '',
    `<div class="confirm-text">确认${action}模板 <strong>${t.name}</strong> 吗？${willEnable?'启用后可在新增公告时引用。':'停用后将不可再引用该模板创建公告。'}</div>`,
    '确定',
    ()=>{
      t.enabled=willEnable;
      renderTemplates();
      fillTemplateSelect();
      closeModal();
      showToast(`模板已${action}`);
    },
    '取消'
  );
}

function saveTemplateLanguage(){
  if(!templateTitleInput||!templateLang)return;
  if(!templateDraftCopy[templateLang]) templateDraftCopy[templateLang]={title:'',body:'',popup:''};
  templateDraftCopy[templateLang].title=templateTitleInput.value;
  templateDraftCopy[templateLang].body=templateBodyInput.value;
  if(templatePopupInput) templateDraftCopy[templateLang].popup=templatePopupInput.value;
  if(templateEnablePopup) templateEnablePopupDisplay=!!templateEnablePopup.checked;
}

function setTemplateLanguage(nextLang){
  saveTemplateLanguage();
  templateLang=nextLang||DEFAULT_LANG;
  if(!templateDraftCopy[templateLang]) templateDraftCopy[templateLang]={title:'',body:'',popup:''};
  templateTitleInput.value=templateDraftCopy[templateLang].title||'';
  templateBodyInput.value=templateDraftCopy[templateLang].body||'';
  if(templatePopupInput) templatePopupInput.value=templateDraftCopy[templateLang].popup||'';
  if(templateEnablePopup) templateEnablePopup.checked=!!templateEnablePopupDisplay;
  const templatePreviewLangEl=document.getElementById('templatePreviewLang');
  if(templatePreviewLangEl) templatePreviewLangEl.value=templateLang;
  document.querySelectorAll('#templateLangTabs .tab').forEach(tab=>tab.classList.toggle('active',tab.dataset.templateLang===templateLang));
  toggleTemplatePopupContent(false);
  renderTemplatePreview();
}

['templateTitleInput','templateBodyInput','templatePopupInput'].forEach(id=>{
  const el=document.getElementById(id);
  if(el) el.oninput=()=>{saveTemplateLanguage();renderTemplatePreview()};
});

function resolveTemplateParams(text,tz){
  let out=text||'';
  templateDraftParams.forEach(p=>{
    out=out.replaceAll(paramToken(p.name),formatParamDisplay(p,tz));
  });
  return out;
}

function toggleTemplatePopupContent(fromUser=true){
  if(templateEnablePopup) templateEnablePopupDisplay=!!templateEnablePopup.checked;
  if(templatePopupContentPanel) templatePopupContentPanel.classList.toggle('hidden',!templateEnablePopupDisplay);
  if(!templateEnablePopupDisplay&&templatePreviewMode==='popup') templatePreviewMode='body';
  syncTemplatePreviewModeUI();
  if(fromUser){saveTemplateLanguage();renderTemplatePreview()}
}

function setTemplatePreviewMode(mode){
  if(mode==='popup'&&!templateEnablePopupDisplay){
    showToast('请先勾选弹窗展示形式');
    return;
  }
  templatePreviewMode=mode==='popup'?'popup':'body';
  syncTemplatePreviewModeUI();
  renderTemplatePreview();
}

function syncTemplatePreviewModeUI(){
  const bodyBtn=document.getElementById('templatePreviewModeBodyBtn');
  const popupBtn=document.getElementById('templatePreviewModePopupBtn');
  if(!templateEnablePopupDisplay&&templatePreviewMode==='popup') templatePreviewMode='body';
  if(popupBtn){
    popupBtn.disabled=!templateEnablePopupDisplay;
    popupBtn.title=templateEnablePopupDisplay?'切换到弹窗预览':'请先勾选弹窗展示形式';
  }
  if(bodyBtn) bodyBtn.classList.toggle('active',templatePreviewMode==='body');
  if(popupBtn) popupBtn.classList.toggle('active',templatePreviewMode==='popup');
  if(templatePreviewBodyView) templatePreviewBodyView.classList.toggle('hidden',templatePreviewMode==='popup');
  if(templatePreviewPopupView) templatePreviewPopupView.classList.toggle('hidden',templatePreviewMode!=='popup');
}

function renderTemplatePreview(){
  if(!templatePreviewTitle)return;
  saveTemplateLanguage();
  syncTemplatePreviewModeUI();
  const tz=baseTz;
  const langKey=templateLang||DEFAULT_LANG;
  const c=templateDraftCopy[langKey]||{};
  const titleText=(resolveTemplateParams(c.title||'',tz)||'').trim();
  const bodyText=(resolveTemplateParams(c.body||'',tz)||'').trim();
  const popupText=(resolveTemplateParams(c.popup||'',tz)||'').trim();
  templatePreviewTitle.textContent=titleText||'请填写公告标题';
  templatePreviewTitle.style.display='';
  templatePreviewTitle.classList.toggle('is-placeholder',!titleText);
  templatePreviewBody.textContent=bodyText||'请输入公告正文';
  templatePreviewBody.style.display='';
  templatePreviewBody.classList.toggle('is-placeholder',!bodyText);
  if(templatePreviewPopup){
    templatePreviewPopup.textContent=popupText||'请填写弹窗展示内容';
    templatePreviewPopup.style.display='';
    templatePreviewPopup.classList.toggle('is-placeholder',!popupText);
  }
  if(templatePreviewPopupTitle){
    templatePreviewPopupTitle.textContent=titleText||'请填写公告标题';
    templatePreviewPopupTitle.style.display='';
    templatePreviewPopupTitle.classList.toggle('is-placeholder',!titleText);
  }
}

function openTemplateEditor(id){
  const t=id?templates.find(x=>x.id===id):null;
  editingTemplateId=t?t.id:null;
  templateEditorTitle.textContent=t?'编辑公告模板':'新增公告模板';
  templateDraftCopy=ensureCopy(t?t.copy:null);
  templateDraftParams=ensureFixedParams(t?t.params||[]:[]);
  templateEnablePopupDisplay=!!(t&&t.enablePopup);
  templatePreviewMode='body';
  templateLang=null;
  paramSource='template';
  paramEditIndex=null;
  paramManagerOpen=false;
  if(modalMask) modalMask.classList.add('hidden');
  showPage('templateEditor');
  setTemplateLanguage(DEFAULT_LANG);
  renderTemplateTokenBars();
}

function renderTemplateTokenBars(){
  const empty='<span style="color:var(--muted);font-size:12px">请先在参数管理中新增参数</span>';
  const bodyHtml=templateDraftParams.length
    ?templateDraftParams.map(p=>`<button class="token" type="button" onclick="insertTemplateToken('${paramToken(p.name)}','body')" title="${paramToken(p.name)}">${p.desc||p.name}</button>`).join('')
    :empty;
  const popupHtml=templateDraftParams.length
    ?templateDraftParams.map(p=>`<button class="token" type="button" onclick="insertTemplateToken('${paramToken(p.name)}','popup')" title="${paramToken(p.name)}">${p.desc||p.name}</button>`).join('')
    :empty;
  const bodyBar=document.getElementById('templateTokenBar');
  const popupBar=document.getElementById('templatePopupTokenBar');
  if(bodyBar) bodyBar.innerHTML=bodyHtml;
  if(popupBar) popupBar.innerHTML=popupHtml;
}

function insertTemplateToken(token,target='body'){
  const el=target==='popup'?templatePopupInput:templateBodyInput;
  if(!el)return;
  const start=el.selectionStart,end=el.selectionEnd;
  el.value=el.value.slice(0,start)+token+el.value.slice(end);
  el.focus();
  el.selectionStart=el.selectionEnd=start+token.length;
  saveTemplateLanguage();
  renderTemplatePreview();
}

function saveTemplate(){
  saveTemplateLanguage();
  const missingTitle=findMissingLang(templateDraftCopy,['title']);
  if(missingTitle){showToast('请完善 '+missingTitle.name+' 的标题');setTemplateLanguage(missingTitle.code);return}
  const missingBody=findMissingLang(templateDraftCopy,['body']);
  if(missingBody){showToast('请完善 '+missingBody.name+' 的正文');setTemplateLanguage(missingBody.code);return}
  if(templateEnablePopupDisplay){
    const missingPopup=findMissingLang(templateDraftCopy,['popup']);
    if(missingPopup){showToast('已开启弹窗展示，请完善 '+missingPopup.name+' 的弹窗展示内容');setTemplateLanguage(missingPopup.code);return}
  }
  const name=primaryCopyTitle(templateDraftCopy);
  if(!name){showToast('请填写模板标题');return}
  const updated=new Date().toISOString().slice(0,16).replace('T',' ');
  const existing=templates.find(x=>x.id===editingTemplateId);
  if(existing){
    existing.name=name;
    existing.copy=ensureCopy(templateDraftCopy);
    existing.params=stripFixedParams(templateDraftParams);
    existing.enablePopup=!!templateEnablePopupDisplay;
    existing.updated=updated;
    if(existing.enabled===undefined) existing.enabled=true;
  }else{
    templates.push({
      id:templateSeq++,
      name,
      desc:'',
      creator:'Admin',
      updated,
      enabled:true,
      enablePopup:!!templateEnablePopupDisplay,
      copy:ensureCopy(templateDraftCopy),
      params:stripFixedParams(templateDraftParams)
    });
  }
  fillTemplateSelect();
  showPage('templates');
  showToast(existing?'模板已更新':'模板已创建');
}

function deleteTemplate(id){
  const t=templates.find(x=>x.id===id);
  openModal('删除模板',t.name,`<div class="confirm-text">确认删除模板 <strong>${t.name}</strong> 吗？已引用该模板创建的公告不受影响。</div>`,'确认删除',()=>{
    templates=templates.filter(x=>x.id!==id);
    renderTemplates();
    fillTemplateSelect();
    closeModal();
    showToast('模板已删除');
  });
}

function fillTemplateSelect(){
  const sel=document.getElementById('editorTplSelect');
  if(!sel)return;
  const cur=sel.value;
  const enabledTemplates=templates.filter(t=>t.enabled!==false);
  sel.innerHTML='<option value="">不使用模板</option>'+enabledTemplates.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
  if(cur && enabledTemplates.some(t=>String(t.id)===String(cur))) sel.value=cur;
  else sel.value='';
}

function applyTemplate(t){
  copy=ensureCopy(t.copy);
  noticeParams=ensureFixedParams(t.params||[]);
  enablePopupDisplay=!!t.enablePopup;
  if(displayFormat) displayFormat.value=enablePopupDisplay?'body_popup':'body_only';
  previewMode='body';
  paramSource='notice';
  loadInputs();
  renderNoticeParams();
  document.querySelectorAll('#editorLangTabs .tab').forEach(x=>x.classList.toggle('active',x.dataset.lang===lang));
  renderPreview();
}

function applyTemplateFromEditor(id){
  if(!id){
    showToast('已取消模板引用，当前内容与参数保留');
    return;
  }
  const t=templates.find(x=>x.id===Number(id));
  if(!t)return;
  if(t.enabled===false){
    showToast('该模板已停用，无法引用');
    fillTemplateSelect();
    return;
  }
  applyTemplate(t);
  showToast('已沿用模板「'+t.name+'」的文案、参数与弹窗设置');
}

function createFromTemplate(id){
  const t=templates.find(x=>x.id===id);
  if(!t)return;
  if(t.enabled===false){
    showToast('该模板已停用，无法引用创建公告');
    return;
  }
  editing=false;editingPublished=false;
  editorTitle.textContent='新增公告（引用模板）';
  resetEditor();
  fillTemplateSelect();
  document.getElementById('editorTplSelect').value=String(id);
  applyTemplate(t);
  showPage('editor');
  setLang(DEFAULT_LANG);
  showToast('已基于模板「'+t.name+'」创建，已沿用其参数与设置');
}

function statusClassName(status){
  return status==='展示中'?'ok'
    :status==='待发布'?'warn'
    :status==='已下架'?'off'
    :status==='已取消'?'cancel'
    :status==='已归档'?'draft'
    :'draft';
}

function getCycleStatus(n){
  if(n.publishMode!=='循环发布'||!n.cycleId) return '无循环';
  return cycleRules[n.cycleId]?.terminated?'已终止':'循环中';
}

function cycleStatusClassName(cycleStatus){
  return cycleStatus==='循环中'?'cycle-on'
    :cycleStatus==='已终止'?'cycle-off'
    :'cycle-none';
}

const ACTION_ICONS={
  edit:`<svg viewBox="0 0 24 24"><path d="M4 20h4l10.5-10.5a2.1 2.1 0 0 0-3-3L5 17v3Z"/><path d="m14 8 3 3"/></svg>`,
  copy:`<svg viewBox="0 0 24 24"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>`,
  cancel:`<svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/><path d="M9 12h6"/></svg>`,
  unshelf:`<svg viewBox="0 0 24 24"><path d="M21 8v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8"/><path d="M23 8H1l2.4-4.8A2 2 0 0 1 5.2 2h13.6a2 2 0 0 1 1.8 1.2L23 8Z"/><path d="M10 12h4"/></svg>`,
  terminate:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 12h6"/></svg>`,
  log:`<svg viewBox="0 0 24 24"><path d="M8 6h11"/><path d="M8 12h11"/><path d="M8 18h11"/><path d="M4 6h.01"/><path d="M4 12h.01"/><path d="M4 18h.01"/></svg>`
};

function iconActionBtn(title,onclick,icon,danger){
  return `<button type="button" class="icon-btn${danger?' danger':''}" title="${title}" aria-label="${title}" onclick="${onclick}">${icon}</button>`;
}

function buildActionButtons(n){
  const status=n.status;
  const isCycle=n.publishMode==='循环发布'&&!!n.cycleId;
  const cycleStatus=getCycleStatus(n);
  const btns=[];
  // 编辑（实时生效）→ 复制 → 危险操作 → 日志
  btns.push(iconActionBtn('编辑',`openEdit(this)`,ACTION_ICONS.edit));
  btns.push(iconActionBtn('复制',`copyNotice(this)`,ACTION_ICONS.copy));
  if(status==='待发布'){
    btns.push(iconActionBtn('取消',`cancelScheduledNotice(this)`,ACTION_ICONS.cancel,true));
  }else if(status==='展示中'&&isCycle){
    btns.push(iconActionBtn('下架',`unshelfNotice(this)`,ACTION_ICONS.unshelf,true));
    if(cycleStatus==='循环中'){
      btns.push(iconActionBtn('终止',`terminateCycle(this)`,ACTION_ICONS.terminate,true));
    }
  }else if(status==='展示中'){
    btns.push(iconActionBtn('下架',`unshelfNotice(this)`,ACTION_ICONS.unshelf,true));
  }
  btns.push(iconActionBtn('日志',`viewOperationLog(this)`,ACTION_ICONS.log));
  return `<div class="icon-actions">${btns.join('')}</div>`;
}

function currentCreatedAt(){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
}

function buildNoticeRow(n){
  const expire=formatListDisplayTime(n.expireTime||'—');
  const cycleStatus=getCycleStatus(n);
  return `<td><span class="mono">${n.noticeId}</span></td><td>${n.name}</td><td>${n.project}</td><td>${n.publishMode}</td><td>${formatListDisplayTime(n.publishTime)}</td><td>${expire}</td><td><span class="pill ${statusClassName(n.status)}">${n.status}</span></td><td><span class="pill ${cycleStatusClassName(cycleStatus)}">${cycleStatus}</span></td><td>${n.creator}</td><td>${formatListDisplayTime(n.createdAt)}</td><td>${buildActionButtons(n)}</td>`;
}

function renderSampleNotices(){
  renderNoticeList(false);
}

try{
  renderSampleNotices();
  renderLangSwitchers();
  initTargetCheckPanels();
  noticeParams=ensureFixedParams(defaultParams);
  fillTemplateSelect();
  loadInputs();
  renderNoticeParams();
  onPublishConfigChange();
  setLang(DEFAULT_LANG);
  showPage('list');
}catch(err){
  console.error('页面初始化失败',err);
  try{ renderSampleNotices(); showPage('list'); }catch(_e){}
}

</script>
