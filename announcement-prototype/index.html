<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>多语言公告配置原型</title><style>*{box-sizing:border-box}body{margin:0;font-family:Arial,"Microsoft YaHei";background:#f5f7fb;color:#1f2937}.top{height:64px;background:#fff;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0}.top h1{font-size:18px}.btn{border:1px solid #dbe1ea;background:#fff;border-radius:8px;padding:9px 14px;cursor:pointer}.primary{background:#4f46e5;color:#fff;border-color:#4f46e5}.wrap{max-width:1500px;margin:auto;padding:20px;display:grid;grid-template-columns:1fr 380px;gap:20px}.card{background:#fff;border:1px solid #e5e9f2;border-radius:12px;margin-bottom:18px;box-shadow:0 8px 24px #0f172a0d}.head{padding:18px 20px;border-bottom:1px solid #e5e9f2;font-weight:700}.body{padding:20px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.field{display:flex;flex-direction:column;gap:7px;font-size:13px}.field label{font-weight:600}.field input,.field select,.field textarea{width:100%;border:1px solid #dfe4ec;border-radius:8px;padding:10px;background:#fff}.field textarea{min-height:130px;resize:vertical}.tip{margin-top:16px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:11px;border-radius:8px;font-size:12px}.tabs{display:flex;border-bottom:1px solid #e5e9f2}.tab{padding:14px 18px;border:0;background:none;cursor:pointer}.tab.on{color:#4f46e5;border-bottom:2px solid #4f46e5;font-weight:700}.tokens button{margin:8px 8px 0 0;border:1px dashed #818cf8;background:#eef2ff;color:#4338ca;border-radius:7px;padding:7px;cursor:pointer}.preview{position:sticky;top:84px}.toolbar{display:flex;gap:8px;padding:14px;border-bottom:1px solid #e5e9f2}.toolbar select{flex:1;padding:9px;border:1px solid #dfe4ec;border-radius:8px}.phone{margin:18px;background:#eef2f7;border:8px solid #111827;border-radius:28px;min-height:590px;overflow:hidden}.bar{height:32px;background:#111827;color:#fff;padding:8px 14px;font-size:11px}.screen{padding:16px}.notice{background:#fff;border-radius:16px;padding:18px}.notice h2{font-size:18px}.notice p{line-height:1.7;color:#4b5563;font-size:14px}.timebox{background:#f8fafc;border:1px solid #e2e8f0;border-radius:9px;padding:11px;margin-top:12px;white-space:pre-line;font-size:13px}.action{margin-top:15px;background:#4f46e5;color:#fff;text-align:center;padding:12px;border-radius:9px}.hidden{display:none}@media(max-width:950px){.wrap{grid-template-columns:1fr}.preview{position:static}}@media(max-width:700px){.grid{grid-template-columns:1fr}}</style></head><body><div class="top"><h1>多语言公告配置 <small style="color:#d97706">草稿</small></h1><div><button class="btn">保存草稿</button> <button class="btn primary" onclick="publishNow()">提交发布</button></div></div><main class="wrap"><section><div class="card"><div class="head">基础信息</div><div class="body"><div class="grid"><div class="field"><label>公告名称 *</label><input value="系统维护通知 - 7月"></div><div class="field"><label>投放地区 *</label><select><option>全部地区</option><option>中国大陆</option><option>印度尼西亚</option></select></div><div class="field"><label>发布方式 *</label><select id="mode" onchange="toggleSchedule()"><option value="schedule">预约发布</option><option value="now">立即发布</option></select></div><div class="field" id="startField"><label>预约发布时间 *</label><input id="start" type="datetime-local" value="2026-07-20T20:00" onchange="render()"></div><div class="field" id="startZoneField"><label>发布时间时区 *</label><select id="startZone" onchange="render()"><option value="Asia/Singapore">新加坡/中国（UTC+8）</option><option value="Asia/Jakarta">雅加达（UTC+7）</option><option value="Asia/Jayapura">印尼东部（UTC+9）</option></select></div><div class="field"><label>过期设置</label><select id="expireMode" onchange="toggleExpire()"><option value="time">指定过期时间</option><option value="never">永久有效</option></select></div><div class="field" id="expireField"><label>过期时间 *</label><input id="expire" type="datetime-local" value="2026-07-27T23:59" onchange="render()"></div><div class="field" id="expireZoneField"><label>过期时间时区 *</label><select id="expireZone" onchange="render()"><option value="Asia/Singapore">新加坡/中国（UTC+8）</option><option value="Asia/Jakarta">雅加达（UTC+7）</option><option value="Asia/Jayapura">印尼东部（UTC+9）</option></select></div><div class="field"><label>过期后处理</label><select><option>停止展示，历史记录保留</option><option>停止展示并移除</option></select></div></div><div class="tip">预约发布时间和过期时间统一转成 UTC 存储；到达预约时间自动发布，到达过期时间停止展示。</div></div></div><div class="card"><div class="head">多语言内容</div><div class="tabs"><button class="tab on" data-lang="zh">简体中文</button><button class="tab" data-lang="id">Bahasa Indonesia</button><button class="tab" data-lang="en">English</button></div><div class="body"><div class="field"><label>公告标题 *</label><input id="title"></div><br><div class="field"><label>公告正文 *</label><textarea id="body"></textarea></div><div class="tokens"><button onclick="token('{{maintenance_time}}')">{{maintenance_time}}</button><button onclick="token('{{resume_time}}')">{{resume_time}}</button></div></div></div><div class="card"><div class="head">时间参数</div><div class="body"><div class="grid"><div class="field"><label>维护时间</label><input id="maintenance" type="datetime-local" value="2026-07-20T20:00" onchange="render()"></div><div class="field"><label>配置时区</label><select id="maintenanceZone" onchange="render()"><option value="Asia/Singapore">Asia/Singapore（UTC+8）</option><option value="Asia/Jakarta">Asia/Jakarta（UTC+7）</option></select></div><div class="field"><label>恢复时间</label><input id="resume" type="datetime-local" value="2026-07-21T02:00" onchange="render()"></div></div></div></div></section><aside class="card preview"><div class="head">用户端实时预览</div><div class="toolbar"><select id="previewLang" onchange="switchLang(this.value)"><option value="zh">简体中文</option><option value="id">Bahasa Indonesia</option><option value="en">English</option></select><select id="previewZone" onchange="render()"><option value="Asia/Shanghai">中国大陆（UTC+8）</option><option value="Asia/Jakarta">雅加达（UTC+7）</option><option value="Asia/Makassar">巴厘岛（UTC+8）</option><option value="Asia/Jayapura">印尼东部（UTC+9）</option></select></div><div class="phone"><div class="bar">10:28</div><div class="screen"><div class="notice"><small style="color:#4f46e5;font-weight:700">SYSTEM NOTICE</small><h2 id="pt"></h2><p id="pb"></p><div class="timebox" id="period"></div><div class="action" id="action"></div></div></div></div></aside></main><script>const data={zh:{title:'系统维护通知',body:'为了提升服务稳定性，系统将于 {{maintenance_time}} 进行维护，预计于 {{resume_time}} 恢复。',btn:'我知道了'},id:{title:'Pemberitahuan Pemeliharaan Sistem',body:'Sistem akan menjalani pemeliharaan pada {{maintenance_time}} dan kembali normal pada {{resume_time}}.',btn:'Mengerti'},en:{title:'System Maintenance Notice',body:'Maintenance starts at {{maintenance_time}} and is expected to finish at {{resume_time}}.',btn:'Got it'}};let lang='zh';function local(v,z){let[a,b]=v.split('T'),[y,m,d]=a.split('-').map(Number),[h,n]=b.split(':').map(Number),p=new Date(Date.UTC(y,m-1,d,h,n)),o={timeZone:z,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false},x={};new Intl.DateTimeFormat('en-US',o).formatToParts(p).forEach(i=>x[i.type]=i.value);return new Date(p.getTime()+Date.UTC(y,m-1,d,h,n)-Date.UTC(+x.year,+x.month-1,+x.day,+x.hour,+x.minute))}function fmt(d,z){return new Intl.DateTimeFormat('zh-CN',{timeZone:z,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).format(d).replaceAll('/','-')}function save(){data[lang].title=title.value;data[lang].body=body.value}function switchLang(l){save();lang=l;title.value=data[l].title;body.value=data[l].body;previewLang.value=l;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.lang===l));render()}function render(){save();let z=previewZone.value,m=fmt(local(maintenance.value,maintenanceZone.value),z),r=fmt(local(resume.value,maintenanceZone.value),z);pt.textContent=data[lang].title;pb.textContent=data[lang].body.replaceAll('{{maintenance_time}}',m).replaceAll('{{resume_time}}',r);action.textContent=data[lang].btn;let s=mode.value==='now'?'立即发布':fmt(local(start.value,startZone.value),z),e=expireMode.value==='never'?'永久有效':fmt(local(expire.value,expireZone.value),z);period.textContent='发布：'+s+'\n过期：'+e}function token(t){let a=body.selectionStart,b=body.selectionEnd;body.value=body.value.slice(0,a)+t+body.value.slice(b);save();render()}function toggleSchedule(){let h=mode.value==='now';startField.classList.toggle('hidden',h);startZoneField.classList.toggle('hidden',h);render()}function toggleExpire(){let h=expireMode.value==='never';expireField.classList.toggle('hidden',h);expireZoneField.classList.toggle('hidden',h);render()}function publishNow(){if(mode.value==='schedule'&&expireMode.value==='time'&&local(expire.value,expireZone.value)<=local(start.value,startZone.value))return alert('过期时间必须晚于预约发布时间');alert('校验通过，可提交发布')}document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchLang(t.dataset.lang));title.oninput=body.oninput=render;switchLang('zh')</script></body></html>
