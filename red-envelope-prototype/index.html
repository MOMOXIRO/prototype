  <style>
    :root {

      --filter-w-sm: 112px;

    body { background: #f5f6fa; color: #1f2430; }
    .main-tab { font-size: 14px; font-weight: 500; color: #334155; }
    .main-tab[aria-selected="true"] { color: #2563eb; border-bottom-color: #2563eb; font-weight: 600; }

    .badge { font-size: 11px; border-radius: 9999px; padding: 2px 8px; font-weight: 700; display: inline-block; }

    .badge-warn { background: #ffedd5; color: #c2410c; }
    .badge-danger { background: #fee2e2; color: #b91c1c; }
    .badge-neutral { background: #eef2f7; color: #64748b; }
    .btn-disabled { opacity: .45; cursor: not-allowed; pointer-events: none; }
    .cell-ellipsis { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .modal-mask { transition: opacity var(--anim-normal) ease; }
    .modal-panel { transform: translateY(14px) scale(.98); opacity: 0; transition: transform var(--anim-normal) ease, opacity var(--anim-normal) ease; }

    .coupon-input {

      color: var(--field-text);
      font-size: 14px;
      font-weight: 400;
      box-sizing: border-box;
      transition: border-color .15s ease, box-shadow .15s ease;

    .coupon-input::placeholder { color: var(--field-placeholder); }
    .coupon-input:hover { border-color: #c4d0e6; }
    select.coupon-input:required:invalid,

    select.coupon-input:has(option[value=""]:checked) { color: var(--field-default-text); }

    .coupon-filter-card .grid.grid-cols-6 > .coupon-input,

      color: #fff;

      background: #fff;
      box-shadow: 0 6px 18px rgba(15,23,42,0.05);
      overflow-x: auto;
      overflow-y: hidden;

    .coupon-table-wrap > table.data-table {
      width: max-content;
      min-width: 100%;
      table-layout: fixed;
      border-collapse: collapse;

      word-break: break-word;
      line-height: 1.4;

      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;

      right: 0;
      top: calc(100% + 6px);

      max-height: 360px;
      overflow: auto;

      border-radius: 10px;
      background: #fff;

      gap: 8px;
      padding: 6px 2px;
      font-size: 12px;
      color: #334155;

    .sticky-col {
      position: sticky;
      background: #fff;
      z-index: 2;
    }
    thead .sticky-col { background: #f5f8fe; z-index: 3; }
    .coupon-switch {
      position: relative;
      width: 42px;
      height: 22px;
      border-radius: 9999px;
      border: 1px solid rgba(15,23,42,0.08);
      transition: all .16s ease;
    }
    .coupon-switch::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 1px 2px rgba(15,23,42,.2);
      transition: left .16s ease;

    .coupon-switch.off { background: #d5dbe8; }

      padding: 0 8px;
      border-radius: 6px;
      background: #2f6bff;
      color: #fff;
      font-size: 11px;
      font-weight: 600;

    .coupon-op-btn:active { transform: translateY(1px); }

    .query-input { height: 36px; min-width: 180px; border: 1px solid #d5ddeb; border-radius: 6px; padding: 0 12px; background: #fff; flex: 0 0 auto; color: var(--field-text); font-size: 14px; font-weight: 400; }

    .range-wrap { display: flex; align-items: center; height: 36px; border: 1px solid #d5ddeb; border-radius: 6px; background: #fff; padding: 0 10px; gap: 8px; min-width: 280px; flex: 0 0 auto; }

    .range-wrap.grid-range { width: 100%; min-width: 0; flex: 1 1 auto; }

    .range-mid { color: #9aa5b6; font-weight: 600; }
    .query-w-90 { width: var(--filter-w-xs); min-width: var(--filter-w-xs); }
    .query-w-110 { width: var(--filter-w-sm); min-width: var(--filter-w-sm); }

    .query-w-150 { width: 160px; min-width: 160px; }

    .query-w-280 { width: var(--filter-w-range); min-width: var(--filter-w-range); }
    .search-grid {

      row-gap: 10px;
      align-items: center;

    .search-actions { display: flex; justify-content: flex-end; gap: 8px; }

    .icon-action-btn {

      height: 32px;
      min-width: 32px;

      background: #2f6bff;
      color: #fff;

      align-items: center;

      color: #334155;
      font-weight: 600;
      font-size: 14px;
      text-align: left;
    }
    .data-table tbody td {
      height: 48px;
      color: #1f2937;
      font-size: 14px;
      border-top: 1px solid #edf1f7;
      vertical-align: middle;
    }
    .toast-host {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 80;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      pointer-events: none;
    }
    .toast-item {
      min-width: 280px;
      max-width: 420px;
      min-height: 44px;
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid #e6eaf2;
      background: #fff;
      box-shadow: 0 10px 28px rgba(15,23,42,0.14);
      color: #1f2937;
      font-size: 13px;
      line-height: 20px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      transform: translateY(10px);
      opacity: 0;
      transition: transform .18s ease, opacity .18s ease;
      pointer-events: auto;
    }
    .toast-item.show { transform: translateY(0); opacity: 1; }
    .toast-icon {
      width: 18px;
      height: 18px;
      border-radius: 9999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      margin-top: 1px;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }
    .toast-success { border-color: #bbf7d0; background: #f0fdf4; color: #166534; }
    .toast-success .toast-icon { background: #22c55e; }
    .toast-warn { border-color: #fde68a; background: #fffbeb; color: #92400e; }
    .toast-warn .toast-icon { background: #f59e0b; }
    .toast-error { border-color: #fecaca; background: #fef2f2; color: #991b1b; }
    .toast-error .toast-icon { background: #ef4444; }

</head>

    function pushNavHistory() {
      const snap = snapshotNav();
      const last = state.navHistory[state.navHistory.length - 1];
      if (last && last.mainTab === snap.mainTab && last.pageId === snap.pageId) return;
      state.navHistory.push(snap);
      if (state.navHistory.length > 40) state.navHistory.shift();
    }

    function switchMain(main) {
      state.navHistory = [];
      state.mainTab = main;
      state.pageId = PAGE_MAP[main][0].id;
      render();
    }

    function switchPage(pageId, options = {}) {
      const skipHistory = !!options.skipHistory;
      const nextMain = options.mainTab || state.mainTab;
      if (!skipHistory && (state.pageId !== pageId || state.mainTab !== nextMain)) {
        pushNavHistory();
      }
      if (options.mainTab) state.mainTab = options.mainTab;
      state.pageId = pageId;
      render();
    }

    function goBack(fallbackPageId, fallbackMainTab) {
      const prev = state.navHistory.pop();
      if (prev) {
        state.mainTab = prev.mainTab;
        state.pageId = prev.pageId;
        render();
        return;
      }
      if (fallbackMainTab) state.mainTab = fallbackMainTab;
      state.pageId = fallbackPageId || (PAGE_MAP[state.mainTab] && PAGE_MAP[state.mainTab][0] ? PAGE_MAP[state.mainTab][0].id : state.pageId);
      render();

      const [main, page, filterGroup, filterKey, encodedValue] = (navValue || "").split("::");
      if (!main || !page) return;
      if (filterGroup && filterKey) {
        const value = decodeURIComponent(encodedValue || "");
        if (state.filters[filterGroup] && Object.prototype.hasOwnProperty.call(state.filters[filterGroup], filterKey)) {
          state.filters[filterGroup][filterKey] = value;
        }
        if (filterGroup === "campaign" && filterKey === "id") state.selectedCampaignId = value;

    function parseMoney(v) {

    }

    function nowStamp() {
      const d = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      return `${pad(d.getDate())}-${pad(d.getMonth()+1)}-${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function formatDisplayTime(value) {
      const text = String(value || "").trim();
      if (!text || text === "--") return "--";
      const iso = text.match(/^(\d{4})-(\d{2})-(\d{2})(?:\s+(\d{2}:\d{2}))?/);
      if (iso) return `${iso[3]}-${iso[2]}-${iso[1]} ${iso[4] || "00:00"}`;
      const slash = text.match(/^(\d{2})-(\d{2})-(\d{4})(?:\s+(\d{2}:\d{2}))?/);
      if (slash) return `${slash[1]}-${slash[2]}-${slash[3]} ${slash[4] || "00:00"}`;
      return text;
    }

    function comparableDateTime(value) {
      const text = String(value || "").trim();
      const display = text.match(/^(\d{2})-(\d{2})-(\d{4})(?:\s+(\d{2}:\d{2}))?/);
      if (display) return `${display[3]}-${display[2]}-${display[1]} ${display[4] || "00:00"}`;
      return text;
    }

    function pushCouponLog(row, content, operator = "Jenny") {
      if (!row) return;
      if (!Array.isArray(row.logs)) row.logs = [];
      row.logs.unshift({ operator, time: nowStamp(), content });

    function formatTaskCoupons(coupons = []) {
      if (!coupons.length) return "--";
      const grouped = coupons.reduce((acc, id) => {
        acc[id] = (acc[id] || 0) + 1;
        return acc;
      }, {});
      return Object.entries(grouped).map(([id, count]) => count > 1 ? `${id}*${count}` : id).join("、");
    }

      return row.task && row.task !== "--" ? [row.task] : [];

      return formatTaskCoupons(ids);

      if (type === "导入") return `导入${count}人`;
      if (type === "添加") return `添加${count}人`;
      if (type === "TagVerse") return row.audience || row.tagVerseName || "--";
      return row.audience || "--";

    function nextCampaignId(project = "Dana", loop = false) {
      const refs = [
        ...state.data.campaigns.map(c => c.id),
        ...state.data.batches.flatMap(b => [b.id, b.campaign]),
        ...state.data.audits.flatMap(a => [a.activity, a.batch]),
        ...state.data.receives.map(r => r.batch),
        ...state.data.usages.map(u => u.batch)
      ];
      const nums = refs
        .flatMap(id => String(id || "").match(/A(\d+)/g) || [])
        .map(m => Number(m.slice(1)))
        .filter(Number.isFinite);
      const next = (nums.length ? Math.max(...nums) : 0) + 1;
      const base = `A${next}`;
      return loop ? `${base}-1` : base;
    }

    function defaultColumnVisibility(defs) {
      return defs.reduce((acc, col) => {
        acc[col.key] = true;
        return acc;
      }, {});
    }

    function getColumnVisibility(kind) {
      const defs = kind === "usage" ? USAGE_LIST_COLUMNS : RECEIVE_LIST_COLUMNS;
      if (!state.columnConfig[kind]) state.columnConfig[kind] = defaultColumnVisibility(defs);
      defs.forEach(col => {
        if (col.fixed) state.columnConfig[kind][col.key] = true;
        else if (state.columnConfig[kind][col.key] === undefined) state.columnConfig[kind][col.key] = true;
      });
      return state.columnConfig[kind];
    }

    function visibleColumns(kind) {
      const defs = kind === "usage" ? USAGE_LIST_COLUMNS : RECEIVE_LIST_COLUMNS;
      const vis = getColumnVisibility(kind);
      const shown = defs.filter(col => col.fixed || vis[col.key]);
      return shown.length ? shown : defs.filter(col => col.fixed);
    }

    function columnConfigButtonHtml(kind) {
      return `<button id="btnColumnConfig" type="button" class="${btnClass(false,true)}" data-col-config="${kind}">列表配置</button>`;
    }

    function openColumnConfigModal(kind) {
      const defs = kind === "usage" ? USAGE_LIST_COLUMNS : RECEIVE_LIST_COLUMNS;
      const vis = { ...getColumnVisibility(kind) };
      const selectable = defs.filter(col => col.key !== "select" && col.key !== "ops");
      const toggleable = selectable.filter(col => !col.fixed);
      const fixedCols = selectable.filter(col => col.fixed);
      fixedCols.forEach(col => { vis[col.key] = true; });
      const renderBody = () => {
        const checkedCount = selectable.filter(col => vis[col.key]).length;
        return `<div class="space-y-3 text-[13px]">
          <div class="flex items-center justify-between">
            <div class="text-[#64748b]">勾选需要在列表中展示的列（共 ${selectable.length} 列，固定 ${fixedCols.length} 列，已选 ${checkedCount} 列）</div>
            <div class="flex gap-2">
              <button type="button" id="btnColSelectAll" class="${btnClass(false,true)}">全选</button>
              <button type="button" id="btnColSelectNone" class="${btnClass(false,true)}">全不选</button>
            </div>
          </div>
          <div class="grid grid-cols-3 gap-x-4 gap-y-2 max-h-[52vh] overflow-auto border border-line rounded p-3">
            ${selectable.map(col => `<label class="flex items-center gap-2 py-1 ${col.fixed ? "text-[#94a3b8]" : ""}"><input type="checkbox" data-col-toggle="${col.key}" class="accent-primary" ${vis[col.key] ? "checked" : ""} ${col.fixed ? "disabled" : ""}><span>${col.label}${col.fixed ? `<span class="text-[11px] text-[#94a3b8]">（固定列）</span>` : ""}</span></label>`).join("")}
          </div>
        </div>`;
      };
      openModal({
        title: "列表展示配置",
        size: "xl",
        body: renderBody(),
        footer: `<button class="${btnClass(false,true)}" data-close-modal>取消</button><button id="btnColumnConfigReset" class="${btnClass(false,true)}">恢复默认</button><button id="btnColumnConfigSave" class="${btnClass(true,true)}">确定</button>`
      });
      const refreshChecks = () => {
        el.modalBody.innerHTML = renderBody();
        bindChecks();
      };
      const bindChecks = () => {
        document.querySelectorAll("[data-col-toggle]").forEach(chk => {
          chk.onchange = () => {
            const col = selectable.find(c => c.key === chk.dataset.colToggle);
            if (!col || col.fixed) return;
            vis[chk.dataset.colToggle] = chk.checked;
            refreshChecks();
          };
        });
        const selectAll = document.getElementById("btnColSelectAll");
        if (selectAll) selectAll.onclick = () => { selectable.forEach(col => { vis[col.key] = true; }); refreshChecks(); };
        const selectNone = document.getElementById("btnColSelectNone");
        if (selectNone) selectNone.onclick = () => {
          toggleable.forEach(col => { vis[col.key] = false; });
          fixedCols.forEach(col => { vis[col.key] = true; });
          refreshChecks();
        };
      };
      bindChecks();
      document.getElementById("btnColumnConfigReset").onclick = () => {
        const defaults = defaultColumnVisibility(defs);
        selectable.forEach(col => { vis[col.key] = col.fixed ? true : defaults[col.key] !== false; });
        refreshChecks();
        notify("success", "已恢复默认列配置");
      };
      document.getElementById("btnColumnConfigSave").onclick = () => {
        fixedCols.forEach(col => { vis[col.key] = true; });
        const selected = selectable.filter(col => vis[col.key]);
        if (!selected.length) return notify("error", "请至少选择一列展示");
        const next = getColumnVisibility(kind);
        selectable.forEach(col => { next[col.key] = col.fixed ? true : !!vis[col.key]; });
        // 选择/操作列随列表能力保留
        if (defs.some(c => c.key === "select")) next.select = true;
        if (defs.some(c => c.key === "ops")) next.ops = true;
        state.columnConfig[kind] = next;
        closeModal();
        render();
        notify("success", "列表展示配置已保存");
      };
      bindModalClose();
    }

    function stickyStyleForColumns(cols) {
      let left = 0;
      const map = {};
      cols.forEach(col => {
        if (col.fixed) {
          map[col.key] = left;
          left += col.width || 80;
        }
      });
      return map;
    }

    function activityIdFromBatch(batch) {
      if (!batch) return "--";
      const campaign = state.data.campaigns.find(c => c.batch === batch || (c.tasks || []).some(t => `${c.id}-${t}` === batch));
      if (campaign) return campaign.id;
      const m = String(batch).match(/^([A-Z]+\d+)/i);
      return m ? m[1] : "--";
    }

    function buildMergedReceiveRows() {
      const audits = state.data.audits.filter(a => auditTabOf(a) === "receive");
      const matchedKeys = new Set();
      const rows = audits.map(a => {
        const sid = String(a.sid || a.object || "").replace(/^SID/i, "");
        const rec = state.data.receives.find(r => String(r.sid) === sid && (!a.batch || r.batch === a.batch))
          || state.data.receives.find(r => String(r.sid) === sid);
        if (rec) matchedKeys.add(`${rec.sid}|${rec.batch}|${rec.couponId || ""}`);
        const campaign = state.data.campaigns.find(c => c.id === a.activity) || state.data.campaigns.find(c => c.name === rec?.campaign);
        return {
          rid: a.rid,
          auditable: true,
          project: auditProject(a) || rec?.project || "--",
          sid,
          vip: rec?.vip || "--",
          region: rec?.region || "--",
          activityId: a.activity || activityIdFromBatch(a.batch || rec?.batch),
          campaign: campaign?.name || rec?.campaign || a.activityName || "--",
          couponId: a.couponId || rec?.couponId || "--",
          couponTitle: auditCouponTitle(a) !== "--" ? auditCouponTitle(a) : couponTitleFromRecord(rec || {}),
          taskName: rec?.task || "--",
          batch: a.batch || rec?.batch || "--",
          condition: rec?.condition || "--",
          couponType: rec?.couponType || "--",
          amount: rec?.amount || a.amount || "--",
          couponStatus: rec?.status || "--",
          receiveType: rec?.receiveType || "--",
          receiveTime: rec?.receive || "--",
          redPacketCount: a.redPacketCount ?? "--",
          dailyCustomCount: a.dailyCustomCount ?? "--",
          trigger: a.trigger || "--",
          auditStatus: a.status || "--",
          auditMethod: a.auditMethod || rec?.auditType || "--",
          applyTime: a.apply || "--",
          reviewTime: a.reviewTime || "--",
          reviewer: a.reviewer || rec?.reviewer || "--",
          auditOpinion: a.status === "审核拒绝" ? (a.auditOpinion || "人工审核拒绝") : (a.auditOpinion || ""),
          useTime: rec?.useTime || "--"
        };
      });
      state.data.receives.forEach(rec => {
        const key = `${rec.sid}|${rec.batch}|${rec.couponId || ""}`;
        if (matchedKeys.has(key)) return;
        const audit = audits.find(a => String(a.sid || a.object || "").replace(/^SID/i, "") === String(rec.sid) && a.batch === rec.batch);
        if (audit) return;
        rows.push({
          rid: `REC-${rec.sid}-${rec.batch}-${rec.couponId || "x"}`,
          auditable: false,
          project: rec.project || "--",
          sid: rec.sid,
          vip: rec.vip || "--",
          region: rec.region || "--",
          activityId: activityIdFromBatch(rec.batch),
          campaign: rec.campaign || "--",
          couponId: rec.couponId || "--",
          couponTitle: couponTitleFromRecord(rec),
          taskName: rec.task || "--",
          batch: rec.batch || "--",
          condition: rec.condition || "--",
          couponType: rec.couponType || "--",
          amount: rec.amount || "--",
          couponStatus: rec.status || "--",
          receiveType: rec.receiveType || "--",
          receiveTime: rec.receive || "--",
          redPacketCount: "--",
          dailyCustomCount: "--",
          trigger: "--",
          auditStatus: rec.auditType === "自动审核" ? "审核通过" : (rec.reason && rec.reason !== "--" ? "审核拒绝" : "审核通过"),
          auditMethod: rec.auditType || "--",
          applyTime: rec.sent || rec.receive || "--",
          reviewTime: "--",
          reviewer: rec.reviewer || "--",
          auditOpinion: rec.reason && rec.reason !== "--" ? rec.reason : "",
          useTime: rec.useTime || "--"
        });
      });
      return rows;
    }

    function buildMergedUsageRows() {
      const audits = state.data.audits.filter(a => auditTabOf(a) === "usage");
      const matched = new Set();
      const rows = audits.map(a => {
        const sid = String(a.sid || a.object || "").replace(/^SID/i, "");
        const usage = state.data.usages.find(u => String(u.sid) === sid && (String(u.order || "").includes(String(a.order || "")) || !a.order))
          || state.data.usages.find(u => String(u.sid) === sid);
        if (usage) matched.add(`${usage.sid}|${usage.order}|${usage.couponId || ""}`);
        const amountNum = Number(String(a.faceValue ?? usage?.amount ?? "").replace(/[^0-9.-]/g, ""));
        return {
          rid: a.rid,
          project: auditProject(a) || usage?.project || "--",
          sid,
          vip: usage?.vip || "--",
          region: a.region || usage?.region || "--",
          campaign: usage?.campaign || "--",
          taskName: usage?.task || "--",
          couponId: a.couponId || usage?.couponId || "--",
          couponTitle: a.coupon || couponTitleFromRecord(usage || {}) || "--",
          batch: usage?.batch || "--",
          condition: usage?.condition || "--",
          couponType: a.couponType || usage?.couponType || "--",
          order: a.order || usage?.order || "--",
          depositOrder: a.depositOrder || "--",

          deduct: a.deduct || usage?.deduct || "--",
          deductType: usage?.deductType || "--",
          receiveTime: usage?.rewardTime || "--",
          useTime: a.useTime || usage?.useTime || "--",
          reviewTime: a.reviewTime || "--",
          auditStatus: a.status || "--",
          auditMethod: a.auditMethod || "--",
          reviewer: a.reviewer || "--",

        };
      });
      state.data.usages.forEach(usage => {
        const key = `${usage.sid}|${usage.order}|${usage.couponId || ""}`;
        if (matched.has(key)) return;
        const amountNum = Number(String(usage.amount ?? "").replace(/[^0-9.-]/g, ""));
        rows.push({
          rid: `USE-${usage.sid}-${usage.order}`,
          project: usage.project || "--",
          sid: usage.sid,
          vip: usage.vip || "--",
          region: usage.region || "--",
          campaign: usage.campaign || "--",
          taskName: usage.task || "--",
          couponId: usage.couponId || "--",
          couponTitle: couponTitleFromRecord(usage),
          batch: usage.batch || "--",
          condition: usage.condition || "--",
          couponType: usage.couponType || "--",
          order: usage.order || "--",
          depositOrder: "--",
          amount: Number.isFinite(amountNum) ? amountNum.toFixed(2) : (usage.amount || "--"),
          deduct: usage.deduct || "--",
          deductType: usage.deductType || "--",
          receiveTime: usage.rewardTime || "--",
          useTime: usage.useTime || "--",
          reviewTime: "--",
          auditStatus: usage.status === "人工审核" ? "待审核" : (usage.status === "自动审核" ? "审核通过" : (usage.status || "待审核")),
          auditMethod: usage.status === "自动审核" ? "自动审核" : (usage.status === "人工审核" ? "人工审核" : "--"),
          reviewer: usage.status === "自动审核" ? "系统" : "--",
          remark: "--"
        });
      });
      return rows;
    }

    function isAuditPending(status) {
      return status === "待审核" || status === "等待审核";
    }

    function auditCategory(row) {
      if (row.type === "特批活动") return "special";
      if (row.type === "自定义红包") return "batch";
      if (row.type === "使用审核") return "usage";
      return "redpacket";
    }

    function auditTabOf(rowOrKey) {
      const key = typeof rowOrKey === "string" ? rowOrKey : auditCategory(rowOrKey);
      if (key === "batch" || key === "special" || key === "issue") return "issue";
      if (key === "redpacket" || key === "receive") return "receive";
      return "usage";
    }

    function auditTypeLabel(row) {
      const cat = auditCategory(row);
      if (cat === "special") return "特批活动";
      if (cat === "batch") return "任务批次";
      if (cat === "usage") return "使用审核";
      return "领取审核";
    }

    function auditIssueAmount(row) {
      if (auditCategory(row) === "special") return row.expectedAmount || row.amount || "--";
      const batch = state.data.batches.find(b => b.id === row.batch);
      if (batch) {
        const total = batchTotalAmount(batch);
        if (total !== "--") return `$${total}`;
      }
      return row.amount || row.expectedAmount || "--";
    }

    function auditIssueTriggerOrReason(row) {
      if (auditCategory(row) === "special") return row.approvalReason || "--";
      const trigger = row.trigger && row.trigger !== "--" ? row.trigger : "";
      const reason = (row.approvalReason || "").trim();
      if (trigger && reason) return `${trigger}；${reason}`;
      return trigger || reason || "--";
    }

    function auditProject(row) {
      if (row?.project) return row.project;
      const campaign = state.data.campaigns.find(c => c.id === row.activity);
      if (campaign?.project) return campaign.project;
      const batch = state.data.batches.find(b => b.id === row.batch);
      if (batch?.project) return batch.project;
      const sid = String(row.sid || row.object || "").replace(/^SID/i, "");
      const receive = state.data.receives.find(r => String(r.sid) === sid);
      return receive?.project || "--";
    }

        },

          impact: "自动审核通过：系统入金生效；人工审核通过：入金生效；审核拒绝：该笔入金不生效，并记录审核备注。"

    function linkedCouponId(id) {
      if (!id || id === "--") return "--";
      const coupon = state.data.coupons.find(c => String(c.id) === String(id));
      if (coupon?.name) return `<a class="text-primary hover:underline" data-record-coupon-name="${coupon.name}">${id}</a>`;
      return `<a class="text-primary hover:underline" data-record-coupon-id="${id}">${id}</a>`;
    }

    function parseDeductAmount(value) {
      const num = Number(String(value ?? "").replace(/[^0-9.-]/g, ""));
      return Number.isFinite(num) ? num : 0;
    }

    function emptyAuditFilters() {
      return { type: "", object: "", activity: "", batch: "", project: "", couponId: "", couponName: "", sid: "", mt4Order: "", depositOrder: "", couponType: "", region: "", auditMethod: "", status: "", reviewer: "", start: "", end: "", reviewStart: "", reviewEnd: "" };
    }

    function applyAuditDecision(row, decision, opinion = "") {
      if (!row) return;
      row.status = decision === "pass" ? "审核通过" : "审核拒绝";
      row.reviewer = "Jenny";
      row.reviewTime = nowStamp();
      row.auditOpinion = opinion || (decision === "pass" ? (auditCategory(row) === "usage" ? "同意使用" : "同意发放") : "人工审核拒绝");
      if (auditCategory(row) === "usage") {
        row.remark = opinion || (decision === "pass" ? "审核通过" : "审核拒绝");
      }
      const category = auditCategory(row);
      if (category === "batch") {
        const batch = state.data.batches.find(x => x.id === row.batch);
        if (batch && decision === "reject") batch.status = "审核拒绝";
      }
      if (category === "special") {
        const campaign = state.data.campaigns.find(x => x.id === row.activity);
        if (campaign) {
          campaign.status = decision === "pass" ? "执行中" : "审核拒绝";
          campaign.statuses = [campaign.status];
        }
        state.data.batches.filter(x => x.campaign === row.activity).forEach(batch => {
          batch.status = decision === "pass" ? "执行中" : "审核拒绝";
        });
      }
    }

    function auditReviewBody(rows, batchMode = false, selectedCount = rows.length) {
      const first = rows[0];
      const meta = auditMeta(first || state.auditTab);
      if (batchMode) {
        return `<div class="space-y-4 text-[13px]">
          <div class="rounded border border-[#bfdbfe] bg-[#eff6ff] px-3 py-2 text-primary font-medium">已选择${selectedCount}条记录，其中待审核${rows.length}条，已审核记录将自动跳过。</div>
          <div class="max-h-[180px] overflow-auto border border-line rounded">
            <table class="w-full text-[12px]">
              <thead class="bg-[#f8faff]"><tr><th class="text-left px-2 py-1">审核对象</th><th class="text-left px-2 py-1">任务批次</th><th class="text-left px-2 py-1">金额</th><th class="text-left px-2 py-1">触发规则/申请理由</th></tr></thead>
              <tbody>${rows.map(row => `<tr class="border-t border-line"><td class="px-2 py-1">${row.object}</td><td class="px-2 py-1">${row.batch || "--"}</td><td class="px-2 py-1">${auditIssueAmount(row)}</td><td class="px-2 py-1">${auditIssueTriggerOrReason(row)}</td></tr>`).join("")}</tbody>
            </table>
          </div>
          <div class="grid grid-cols-[160px_1fr] gap-3">
            <div><label class="form-label required mb-1">审核结论</label><select id="auditDecision" class="w-full border border-line rounded px-3 py-2"><option value="pass">通过</option><option value="reject">拒绝</option></select></div>
            <div><label class="form-label mb-1">审核意见</label><textarea id="auditOpinion" class="w-full min-h-[86px] border border-line rounded px-3 py-2" placeholder="填写审核意见，拒绝时建议说明原因"></textarea></div>
          </div>
        </div>`;
      }
      if (auditCategory(first) === "usage") {
        return `<div class="space-y-4 text-[13px]">
          <div class="rounded border border-[#bfdbfe] bg-[#eff6ff] px-3 py-2 text-[12px] text-[#1e40af] leading-6">${meta.trigger}</div>
          <div class="border border-line rounded p-3 grid grid-cols-2 gap-2 text-[12px]"><div><span class="text-[#64748b]">SID：</span>${first?.sid || "--"}</div><div><span class="text-[#64748b]">红包ID：</span>${first?.couponId || "--"}</div><div><span class="text-[#64748b]">红包类型：</span>${first?.couponType || "--"}</div><div><span class="text-[#64748b]">金额：</span>${(() => { const n = Number(String(first?.faceValue ?? "").replace(/[^0-9.-]/g, "")); return Number.isFinite(n) ? n.toFixed(2) : "--"; })()}</div><div><span class="text-[#64748b]">实际抵扣：</span>${first?.deduct || "--"}</div><div><span class="text-[#64748b]">订单号：</span>${first?.order || "--"}</div><div><span class="text-[#64748b]">入金订单：</span>${first?.depositOrder || "--"}</div></div>
          <div class="grid grid-cols-[160px_1fr] gap-3">
            <div><label class="form-label required mb-1">审核结论</label><select id="auditDecision" class="w-full border border-line rounded px-3 py-2"><option value="pass">通过</option><option value="reject">拒绝</option></select></div>
            <div><label class="form-label mb-1">审核意见</label><textarea id="auditOpinion" class="w-full min-h-[86px] border border-line rounded px-3 py-2" placeholder="填写审核意见，拒绝时建议说明原因"></textarea></div>
          </div>
        </div>`;
      }
      return `<div class="space-y-4 text-[13px]">
        <div class="border border-line rounded p-3"><div class="font-semibold mb-2">触发规则</div><div class="text-[#475569] leading-6">${meta.trigger}</div>${first?.trigger && first.trigger !== "--" ? `<div class="mt-2 text-[12px] text-primary">本次命中：${first.trigger}</div>` : ""}</div>
        ${auditCategory(first) === "special" ? `<div class="border border-line rounded p-3"><div class="font-semibold mb-2">申请原因</div><div class="text-[#475569] leading-6">${first?.approvalReason || "--"}</div></div>` : ""}
        <div class="grid grid-cols-[160px_1fr] gap-3">
          <div><label class="form-label required mb-1">审核结论</label><select id="auditDecision" class="w-full border border-line rounded px-3 py-2"><option value="pass">通过</option><option value="reject">拒绝</option></select></div>
          <div><label class="form-label mb-1">审核意见</label><textarea id="auditOpinion" class="w-full min-h-[86px] border border-line rounded px-3 py-2" placeholder="填写审核意见，拒绝时建议说明原因"></textarea></div>
        </div>
      </div>`;
    }

    function openAuditReviewModal(rid, presetDecision = "") {
      const row = state.data.audits.find(r => r.rid === rid);
      if (!row) return;
      if (!isAuditPending(row.status)) return notify("warn", "该记录已完成审核");
      const category = auditCategory(row);
      const objectId = category === "redpacket" || category === "usage"
        ? String(row.sid || row.object || "").replace(/^SID/i, "")
        : category === "batch"
          ? row.batch
          : row.activity;
      openModal({
        title: `${auditMeta(row).type} - ${objectId}`,
        body: auditReviewBody([row]),
        footer: `<button class="${btnClass(false,true)}" data-close-modal>取消</button><button id="submitAuditReview" class="${btnClass(true,true)}">确认提交</button>`
      });
      const decisionEl = document.getElementById("auditDecision");
      if (decisionEl && (presetDecision === "pass" || presetDecision === "reject")) decisionEl.value = presetDecision;
      document.getElementById("submitAuditReview").onclick = () => {
        const decision = document.getElementById("auditDecision").value;
        const opinion = document.getElementById("auditOpinion").value.trim();
        if (decision === "reject" && !opinion) return notify("error", "审核拒绝需填写审核意见");
        applyAuditDecision(row, decision, opinion);
        closeModal();
        notify(decision === "pass" ? "success" : "warn", `${row.rid} ${decision === "pass" ? "审核通过" : "审核拒绝"}`);
        render();
      };
      bindModalClose();
    }

    function openBatchAuditReviewModal() {
      const rows = state.data.audits.filter(r => state.selectedRows.has(r.rid) && auditTabOf(r) === state.auditTab);
      if (!rows.length) return notify("error", "请先勾选当前审核类型下的记录");
      const pendingRows = rows.filter(row => isAuditPending(row.status));
      if (!pendingRows.length) return notify("warn", `已选择${rows.length}条记录，其中待审核0条，已审核记录将自动跳过。`);
      openModal({
        title: "批量审核确认",
        body: auditReviewBody(pendingRows, true, rows.length),
        footer: `<button class="${btnClass(false,true)}" data-close-modal>取消</button><button id="submitBatchAuditReview" class="${btnClass(true,true)}">确认提交</button>`
      });
      document.getElementById("submitBatchAuditReview").onclick = () => {
        const decision = document.getElementById("auditDecision").value;
        const opinion = document.getElementById("auditOpinion").value.trim();
        if (decision === "reject" && !opinion) return notify("error", "批量拒绝需填写审核意见");
        pendingRows.forEach(row => applyAuditDecision(row, decision, opinion));
        state.selectedRows.clear();
        closeModal();
        notify(decision === "pass" ? "success" : "warn", `已批量${decision === "pass" ? "通过" : "拒绝"} ${pendingRows.length} 条待审核记录`);
        render();
      };
      bindModalClose();
    }

    function taskIdByDisplayName(name, batch = "") {
      const taskIdFromBatch = extractTaskIdFromText(batch);
      if (taskIdFromBatch && state.data.tasks.some(t => t.id === taskIdFromBatch)) return taskIdFromBatch;
      const text = String(name || "");
      const direct = state.data.tasks.find(t => t.name === text || text.includes(t.name) || t.name.includes(text));
      if (direct) return direct.id;
      if (/实盘|交易/.test(text)) return state.data.tasks.find(t => t.type === "实盘交易")?.id || "";
      if (/充值|充/.test(text)) return state.data.tasks.find(t => t.type === "充值")?.id || "";
      if (/理财/.test(text)) return state.data.tasks.find(t => t.type === "理财")?.id || "";
      if (/无任务|奖励|体验金/.test(text)) return state.data.tasks.find(t => t.type === "无任务")?.id || "";
      return "";
    }

    function linkedTaskName(name, batch = "") {
      if (!name || name === "--") return "--";
      const taskId = taskIdByDisplayName(name, batch);
      return taskId ? `<a class="text-primary hover:underline" data-record-task-detail="${taskId}">${name}</a>` : name;
    }

    function linkedCouponName(name) {
      if (!name || name === "--") return "--";
      return `<a class="text-primary hover:underline" data-record-coupon-name="${name}">${name}</a>`;
    }

    function nextTaskId() {
      const refs = [
        ...state.data.tasks.map(t => t.id),
        ...state.data.batches.map(b => b.task),
        ...state.data.batches.map(b => b.id),
        ...state.data.campaigns.flatMap(c => [c.task, ...(c.tasks || [])]),
        ...state.data.audits.map(a => a.batch)
      ];
      const nums = refs
        .flatMap(id => String(id || "").match(/T(\d+)/g) || [])
        .map(m => Number(m.slice(1)))
        .filter(Number.isFinite);
      const next = (nums.length ? Math.max(...nums) : 0) + 1;
      return `T${next}`;
    }

    function extractTaskIdFromText(text = "") {
      const matches = String(text).match(/T\d+/g) || [];
      if (!matches.length) return "";
      const known = matches.find(id => state.data.tasks.some(t => t.id === id));
      return known || matches[matches.length - 1];
    }

    function taskConditionFromDraft(d) {
      if (d.type === "充值") return `充值金额 >= ${d.rechargeAmount || "X"}`;
      if (d.type === "实盘交易") return `实盘手数 >= ${d.tradeLots || "X"}`;
      if (d.type === "理财") return `理财时长${d.financeDays || "X"}天，年化收益${d.financeRate || "X"}%，最低存款金额${d.financeDeposit || "X"}`;
      return "--";
    }

    function normalizeTaskValidType(type = "") {
      if (type === "领取后N天") return "领取后";
      if (type === "发放后N天") return "发放后";
      if (type === "固定日期范围") return "日期范围";
      return type || "";
    }

    function formatTaskValidity(taskOrDraft = {}) {
      if (taskOrDraft.type === "无任务") return "--";
      const validType = normalizeTaskValidType(taskOrDraft.taskValidType) || "发放后";
      if (validType === "日期范围") return `${taskOrDraft.taskValidStart || "--"} ~ ${taskOrDraft.taskValidEnd || "--"}`;
      return `${validType}${taskOrDraft.taskValidDays || "N"}天`;
    }

    function taskLangTypeFromTaskType(type) {
      return type === "充值" ? "充值任务" : type === "实盘交易" ? "实盘交易" : type === "理财" ? "理财任务" : "无任务";
    }

    function fillTemplateParams(template, draft, coupon) {
      const ratio = couponSupportsRatio(coupon) && coupon?.ratio != null && String(coupon.ratio).trim() !== ""
        ? String(coupon.ratio).trim().replace(/%$/, "")
        : (coupon?.id ? (draft.couponRatios?.[coupon.id] || "") : "");
      return (template || "")
        .replaceAll("{amount}", coupon?.amount || "$0")
        .replaceAll("{count}", draft.rechargeAmount || "50")
        .replaceAll("{number}", draft.tradeLots || "3")
        .replaceAll("{days}", draft.financeDays || "30")
        .replaceAll("{rate}", draft.financeRate || "2")
        .replaceAll("{deposit}", draft.financeDeposit || "1000")
        .replaceAll("{ratio}", ratio || "--");
    }

    function defaultTaskDescTemplate(type) {
      if (type === "充值") return "You must first complete a recharge of {count}.";
      if (type === "实盘交易") return "You must first complete the {number}-way trade.";
      if (type === "理财") return "You must keep the deposit for {days} days with {rate}% annualized return and at least {deposit}.";
      return "Open the app to check details and conditions.";
    }

    function resolveCouponTitleTemplate(coupon, lang = "英文") {
      ensureTaskLangTemplates();
      if (!coupon) {
        if (state.taskModal.selectedCouponId === "FINANCE") return "理财任务";
        return "--";
      }
      const tpl = state.taskLang.titleTemplates[lang]?.[coupon.type];
      if (tpl && tpl.trim()) {
        return tpl.replace(/\{amount\}/g, coupon.amount || "");
      }
      return couponTitle(coupon);
    }

    function defaultTaskCouponConfig(couponId, draft = state.taskModal.draft) {
      ensureTaskLangTemplates();
      const isFinanceConfig = couponId === "FINANCE" || draft?.type === "理财";
      const coupon = isFinanceConfig ? null : state.data.coupons.find(c => c.id === couponId);
      const taskTplType = taskLangTypeFromTaskType(isFinanceConfig ? "理财" : draft.type);
      return state.taskLang.languages.reduce((acc, lang) => {
        const taskTpl = state.taskLang.templates[lang]?.[taskTplType] || defaultTaskDescTemplate(isFinanceConfig ? "理财" : draft.type);
        acc[lang] = {
          title: isFinanceConfig ? "理财任务" : resolveCouponTitleTemplate(coupon, lang),
          desc: fillTemplateParams(taskTpl, draft, coupon)
        };
        return acc;
      }, {});
    }

    function ensureTaskCouponConfig(couponId) {
      const d = state.taskModal.draft || {};
      if (!d.langConfigs) d.langConfigs = {};
      if (!d.langConfigs[couponId]) d.langConfigs[couponId] = defaultTaskCouponConfig(couponId, d);
      state.taskModal.draft = d;
      return d.langConfigs[couponId];
    }

    function isJumpUrlValue(value = "") {
      return /^https?:\/\//i.test(String(value || "").trim());
    }

    function resolveTaskJumpType(task = {}) {
      if (task.jumpType === "URL链接" || task.jumpType === "APP内部跳转") return task.jumpType;
      return isJumpUrlValue(task.jumpUrl || task.appJump) ? "URL链接" : "APP内部跳转";
    }

    function taskDraftFromTask(task = {}) {
      const jumpType = resolveTaskJumpType(task);
      const jumpValue = task.jumpUrl || task.appJump || "";
      return {
        id: task.id || "",
        name: task.name || "",
        type: task.type || "无任务",
        app: task.app || "Dana",
        enabled: task.enabled !== false,
        status: task.status || "启用",
        couponsText: (task.coupons || []).join(","),
        rechargeAmount: task.type === "充值" ? (String(task.condition || "").match(/>=\s*(\d+)/)?.[1] || "50") : "50",
        tradeLots: task.type === "实盘交易" ? (String(task.condition || "").match(/>=\s*(\d+)/)?.[1] || "2") : "2",
        financeDays: task.type === "理财" ? (String(task.condition || "").match(/时长(\d+)天/)?.[1] || "30") : "30",
        financeRate: task.type === "理财" ? (String(task.condition || "").match(/收益(\d+(?:\.\d+)?)%/)?.[1] || "2") : "2",
        financeDeposit: task.type === "理财" ? (String(task.condition || "").match(/金额(\d+)/)?.[1] || "1000") : "1000",
        taskValidType: normalizeTaskValidType(task.taskValidType) || (task.type === "无任务" ? "" : "发放后"),
        taskValidDays: task.taskValidDays || (task.type === "无任务" ? "" : "30"),
        taskValidStart: task.taskValidStart || "",
        taskValidEnd: task.taskValidEnd || "",
        jumpType,
        appJump: jumpType === "APP内部跳转" ? (task.appJump || "") : "",
        jumpUrl: jumpType === "URL链接" ? jumpValue : (task.jumpUrl || ""),
        couponRatios: { ...(task.couponRatios || {}) },
        langConfigs: JSON.parse(JSON.stringify(task.langConfigs || {}))
      };
    }

    function openReadonlyTaskCouponConfig(taskId, couponId) {
      const task = state.data.tasks.find(x => x.id === taskId) || state.data.tasks.find(x => (x.coupons || []).includes(couponId)) || state.data.tasks[0];
      state.selectedTaskId = task?.id || taskId || "";
      state.taskModal.draft = normalizeTaskDraft(taskDraftFromTask(task));
      state.taskLang.selectedLanguage = "英文";
      openTaskCouponConfigStacked(couponId, true);
    }

    const MAX_TASK_COUPONS = 10;
    const MAX_CAMPAIGN_TASKS = 5;

    function taskCouponIdsFromText(text = "") {
      return text.split(",").map(x => x.trim()).filter(Boolean);
    }

    function couponSupportsRatio(couponOrType) {
      const type = typeof couponOrType === "string" ? couponOrType : (couponOrType?.type || "");
      return ["手续费抵扣红包","盈亏抵扣红包"].includes(type);
    }

    function couponRatioText(coupon) {
      if (!couponSupportsRatio(coupon)) return "--";
      const ratio = coupon?.ratio;
      if (ratio === undefined || ratio === null || String(ratio).trim() === "") return "--";
      return `${String(ratio).trim().replace(/%$/, "")}%`;
    }

    function setTaskCouponQuantity(couponId, nextCount) {
      const d = state.taskModal.draft || {};
      const keep = taskCouponIdsFromText(d.couponsText).filter(id => id !== couponId);
      const maxAdd = Math.max(0, MAX_TASK_COUPONS - keep.length);
      const safeCount = Math.min(Math.max(0, nextCount), maxAdd);
      const add = Array.from({ length: safeCount }, () => couponId);
      d.couponsText = [...keep, ...add].join(",");
      if (safeCount <= 0 && d.langConfigs) delete d.langConfigs[couponId];
      state.taskModal.draft = d;
      return safeCount;
    }

    function saveStackedTaskCouponConfig() {
      const descInput = document.getElementById("taskCouponDescInput");
      if (!descInput) return true;
      const desc = descInput.value.trim();
      if (!desc) {
        notify("error", "红包描述必填");
        return false;
      }
      const titleInput = document.getElementById("taskCouponTitleInput");
      const coupon = state.data.coupons.find(c => c.id === state.taskModal.selectedCouponId);
      const title = (titleInput ? titleInput.value.trim() : "") || resolveCouponTitleTemplate(coupon, state.taskLang.selectedLanguage);
      if (titleInput && !titleInput.value.trim()) {
        notify("error", "红包标题必填");
        return false;
      }
      const config = ensureTaskCouponConfig(state.taskModal.selectedCouponId);
      config[state.taskLang.selectedLanguage] = { title, desc };
      return true;
    }

    function renderStackedTaskCouponConfig(host, readonly = false) {
      ensureTaskLangTemplates();
      const L = state.taskLang;
      const couponId = state.taskModal.selectedCouponId;
      const coupon = state.data.coupons.find(c => c.id === couponId);
      const config = ensureTaskCouponConfig(couponId);
      const current = config[L.selectedLanguage] || { title: "", desc: "" };
      const titleValue = current.title || resolveCouponTitleTemplate(coupon, L.selectedLanguage);
      host.querySelector(".stacked-modal-body").innerHTML = `<div class="grid grid-cols-[340px_1fr] gap-8 text-[14px]">
        <div>
          <div class="font-semibold mb-3">1 选择语言</div>
          <div class="space-y-3">${L.languages.map(lang => `<button data-stacked-task-lang-item="${lang}" class="w-full h-14 px-4 rounded border text-left flex items-center justify-between font-semibold ${L.selectedLanguage===lang ? "border-primary bg-[#f0f6ff]" : "border-line bg-white"}"><span>${lang}</span><span class="text-[#16a34a] text-[12px]">已配置</span></button>`).join("")}</div>
        </div>
        <div>
          <div class="flex items-center justify-between mb-5">
            <div class="font-semibold">2 ${readonly ? "查看" : "配置"}红包多语言</div>
            ${readonly ? "" : `<button id="btnResetTaskCouponConfig" class="${btnClass(false,true)}">同步</button>`}
          </div>
          <div class="mb-4 text-[#64748b]">${couponId === "FINANCE" ? "当前任务：理财任务" : `当前红包：${couponId || "--"} ${couponTitle(coupon)}`}</div>
          <label class="form-label ${readonly ? "" : "required"} mb-1">红包标题</label>
          ${readonly
            ? `<div class="w-full border border-line rounded px-3 py-2 mb-4 bg-gray-50 text-[#475569]">${titleValue}</div>`
            : `<input id="taskCouponTitleInput" class="w-full border border-line rounded px-3 py-2 mb-4" placeholder="请输入红包标题" value="${String(titleValue || "").replace(/"/g, "&quot;")}">`}
          <label class="form-label required mb-1">红包描述</label>
          <textarea id="taskCouponDescInput" class="w-full min-h-[108px] border border-line rounded px-3 py-2 ${readonly ? "bg-gray-50 text-[#475569]" : ""}" placeholder="You must first complete the 3-way trade." ${readonly ? "disabled" : ""}>${current.desc || ""}</textarea>
          ${readonly ? "" : `<div class="mt-3 text-[12px] leading-5 text-[#b7791f]">{number}：实盘交易任务参数；{count}：充值金额任务参数；{ratio}：抵扣比例参数；<br>{days}：理财时长参数；{rate}：理财年化收益参数；{deposit}：最低存款金额参数；</div><div class="text-[12px] text-[#64748b] mt-1">红包标题默认来自红包标题多语言模板，可在当前任务内单独编辑；红包描述仅保存当前任务内该红包组合的副本。</div>`}
        </div>
      </div>`;
      host.querySelector(".stacked-modal-footer").innerHTML = readonly
        ? `<button class="${btnClass(false,true)}" data-close-stacked-modal>关闭</button>`
        : `<button class="${btnClass(false,true)}" data-close-stacked-modal>取消</button><button id="btnSaveTaskCouponConfig" class="${btnClass(true,true)}">保存</button>`;
      host.querySelectorAll("[data-close-stacked-modal]").forEach(btn => btn.onclick = () => closeStackedModal(host));
      host.querySelectorAll("[data-stacked-task-lang-item]").forEach(btn => {
        btn.onclick = () => {
          if (!readonly && !saveStackedTaskCouponConfig()) return;
          state.taskLang.selectedLanguage = btn.dataset.stackedTaskLangItem;
          renderStackedTaskCouponConfig(host, readonly);
        };
      });
      const reset = host.querySelector("#btnResetTaskCouponConfig");
      if (reset) reset.onclick = () => {
        state.taskModal.draft.langConfigs[couponId] = defaultTaskCouponConfig(couponId, state.taskModal.draft);
        notify("success", "已同步模板文案");
        renderStackedTaskCouponConfig(host);
      };
      const save = host.querySelector("#btnSaveTaskCouponConfig");
      if (save) save.onclick = () => {
        if (!saveStackedTaskCouponConfig()) return;
        notify("success", "当前红包配置保存成功");
        closeStackedModal(host);
      };
    }

    function openTaskCouponConfigStacked(couponId, readonly = false) {
      state.taskModal.selectedCouponId = couponId;
      ensureTaskCouponConfig(couponId);
      const host = openStackedModal({ title: readonly ? "查看红包多语言" : "配置红包多语言", body: "", footer: "" });
      renderStackedTaskCouponConfig(host, readonly);
    }

    function taskTypeOptionsForProject(project) {
      const base = ["无任务","充值","实盘交易"];
      return project === "Dana" ? [...base, "理财"] : base;
    }

    function normalizeTaskDraft(d) {
      if (!d.app) d.app = "Dana";
      const options = taskTypeOptionsForProject(d.app);
      if (!options.includes(d.type)) d.type = "无任务";
      if (d.type !== "无任务" && !d.taskValidType) d.taskValidType = "发放后";
      d.taskValidType = normalizeTaskValidType(d.taskValidType);
      if (!d.jumpType || !["APP内部跳转", "URL链接"].includes(d.jumpType)) {
        d.jumpType = resolveTaskJumpType(d);
      }
      if (d.type === "无任务") {
        d.taskValidType = "";
        d.taskValidDays = "";
        d.taskValidStart = "";
        d.taskValidEnd = "";
        d.jumpType = "APP内部跳转";
        d.appJump = "";
        d.jumpUrl = "";
      }
      if (d.type === "理财") {
        d.couponsText = "";
        d.couponRatios = {};
      }
      if (d.type !== "无任务" && d.type !== "理财") {
        const firstCouponId = taskCouponIdsFromText(d.couponsText || "")[0] || "";
        d.couponsText = firstCouponId;
      }
      if (!d.couponRatios) d.couponRatios = {};
      if (!d.jumpUrl) d.jumpUrl = "";
      if (!d.appJump) d.appJump = "";
      return d;
    }

    function openTaskModal(mode = "create", sourceId = "") {
      const source = state.data.tasks.find(t => t.id === sourceId);
      const draft = source ? taskDraftFromTask(source) : {
        id: "",
        name: "",
        type: "无任务",
        app: "Dana",
        enabled: true,
        status: "启用",
        couponsText: "",
        rechargeAmount: "",
        tradeLots: "",
        financeDays: "",
        financeRate: "",
        financeDeposit: "",
        taskValidType: "",
        taskValidDays: "",
        taskValidStart: "",
        taskValidEnd: "",
        jumpType: "APP内部跳转",
        appJump: "",
        jumpUrl: "",
        couponRatios: {},
        langConfigs: {}
      };
      state.taskModal = { mode, sourceId, draft: normalizeTaskDraft(draft) };
      switchPage("task-create-modal");

    function saveCurrentTaskDraft() {
      const d = state.taskModal.draft || {};
      const ids = ["taskName","taskType","taskProject","taskRechargeAmount","taskTradeLots","taskFinanceDays","taskFinanceRate","taskFinanceDeposit","taskValidType","taskValidDays","taskValidStart","taskValidEnd","taskJumpType","taskAppJump","taskJumpUrl"];

        if (!node) return;
        const key = {
          taskName: "name",
          taskType: "type",
          taskProject: "app",
          taskRechargeAmount: "rechargeAmount",
          taskTradeLots: "tradeLots",
          taskFinanceDays: "financeDays",
          taskFinanceRate: "financeRate",
          taskFinanceDeposit: "financeDeposit",
          taskValidType: "taskValidType",
          taskValidDays: "taskValidDays",
          taskValidStart: "taskValidStart",
          taskValidEnd: "taskValidEnd",
          taskJumpType: "jumpType",
          taskAppJump: "appJump",
          taskJumpUrl: "jumpUrl"
        }[id];
        d[key] = node.value.trim();
      });

    function validateTaskDraft(d) {
      if (!d.name) return "任务名称必填";
      if (!d.app) return "项目必填";
      if (!d.type) return "任务类型必填";
      if (d.app !== "Dana" && d.type === "理财") return "只有项目 Dana 支持理财任务";
      if (d.type === "充值" && (!d.rechargeAmount || Number(d.rechargeAmount) <= 0)) return "充值金额必须大于 0";
      if (d.type === "实盘交易" && (!d.tradeLots || Number(d.tradeLots) <= 0)) return "实盘手数必须大于 0";
      if (d.type === "理财" && (!d.financeDays || !d.financeRate || !d.financeDeposit)) return "理财任务需填写理财时长、年化收益、最低存款金额";
      if (d.type !== "无任务") {
        if (!d.taskValidType) return "请选择任务有效期类型";
        if (d.taskValidType === "日期范围") {
          if (!d.taskValidStart || !d.taskValidEnd) return "日期范围需选择开始日期和结束日期";
          if (d.taskValidStart > d.taskValidEnd) return "任务有效期结束日期不能早于开始日期";
        } else {
          const taskValidDaysNum = Number(d.taskValidDays);
          if (!Number.isInteger(taskValidDaysNum) || taskValidDaysNum <= 0) return "任务有效期天数必须填写正整数";
        }
        if (!d.jumpType) return "请选择跳转方式";
        if (d.jumpType === "APP内部跳转" && !d.appJump) return "请选择APP跳转页面";
        if (d.jumpType === "URL链接") {
          if (!d.jumpUrl) return "请填写URL链接";
          if (!isJumpUrlValue(d.jumpUrl)) return "URL链接需以 http:// 或 https:// 开头";
        }
      }
      if (d.type !== "理财" && !d.couponsText.trim()) return "请至少关联一个红包";
      const couponIds = taskCouponIdsFromText(d.couponsText);
      if (d.type !== "无任务" && d.type !== "理财" && couponIds.length > 1) return "充值/实盘交易任务一次只能关联一个红包";
      if (d.type !== "理财" && couponIds.length > MAX_TASK_COUPONS) return `单个任务最多添加${MAX_TASK_COUPONS}个红包（按数量累计）`;
      return "";
    }

    function ensureTaskLangTemplates() {
      const L = state.taskLang;
      if (!Array.isArray(L.titleTypes)) L.titleTypes = ["现金红包","手续费抵扣红包","盈亏抵扣红包","提现免佣券"];
      if (!Array.isArray(L.descTypes)) L.descTypes = ["无任务","充值任务","实盘交易","理财任务"];
      if (!L.types) L.types = L.descTypes;
      if (!L.selectedTitleType) L.selectedTitleType = "现金红包";
      if (!L.tab) L.tab = "title";
      if (!L.titleTemplates) L.titleTemplates = {};
      if (!L.templates) L.templates = {};
      L.languages.forEach((lang) => {
        if (!L.templates[lang]) L.templates[lang] = {};
        if (!L.titleTemplates[lang]) L.titleTemplates[lang] = {};
        L.descTypes.forEach((type) => {
          if (typeof L.templates[lang][type] !== "string") L.templates[lang][type] = "";
        });
        L.titleTypes.forEach((type) => {
          if (typeof L.titleTemplates[lang][type] !== "string") L.titleTemplates[lang][type] = "";
        });
      });
    }

    function isCouponTitleTypeConfigured(type, lang = state.taskLang.selectedLanguage) {
      ensureTaskLangTemplates();
      return Boolean(state.taskLang.titleTemplates[lang]?.[type]?.trim());
    }

    function isCouponTitleLanguageConfigured(lang) {
      ensureTaskLangTemplates();
      return state.taskLang.titleTypes.every(type => isCouponTitleTypeConfigured(type, lang));
    }

    function isTaskTypeConfigured(type, lang = state.taskLang.selectedLanguage) {
      ensureTaskLangTemplates();
      return Boolean(state.taskLang.templates[lang]?.[type]?.trim());
    }

    function isTaskLanguageConfigured(lang) {
      ensureTaskLangTemplates();
      return state.taskLang.descTypes.every(type => isTaskTypeConfigured(type, lang));
    }

    function isMultiLangLanguageConfigured(lang) {
      return state.taskLang.tab === "title"
        ? isCouponTitleLanguageConfigured(lang)
        : isTaskLanguageConfigured(lang);
    }

    function refreshTaskLangStatusUI() {
      ensureTaskLangTemplates();
      document.querySelectorAll("[data-task-lang-type]").forEach(btn => {
        const type = btn.dataset.taskLangType;
        const icon = btn.querySelector("span:first-child");
        const configured = state.taskLang.tab === "title"
          ? isCouponTitleTypeConfigured(type)
          : isTaskTypeConfigured(type);
        if (!icon) return;
        icon.className = configured
          ? "inline-flex items-center justify-center w-4 h-4 rounded-full bg-[#22c55e] text-white text-[10px]"
          : "inline-flex items-center justify-center w-4 h-4 rounded-full border border-[#cbd5e1] text-transparent";
        icon.textContent = configured ? "✓" : "";
      });
      document.querySelectorAll("[data-task-lang-item]").forEach(btn => {
        const lang = btn.dataset.taskLangItem;
        const status = btn.querySelector("span:last-child");
        const configured = isMultiLangLanguageConfigured(lang);
        if (!status) return;
        status.className = `text-[11px] ${configured ? "text-[#16a34a]" : "text-[#94a3b8]"}`;
        status.textContent = configured ? "已配置" : "未配置";
      });
    }

    function saveCurrentTaskLangInput() {
      const input = document.getElementById("taskLangInput");
      if (!input) return;
      ensureTaskLangTemplates();
      const L = state.taskLang;
      if (L.tab === "title") {
        L.titleTemplates[L.selectedLanguage][L.selectedTitleType] = input.value;
      } else {
        L.templates[L.selectedLanguage][L.selectedType] = input.value;
      }
    }

    function pushTaskLog(row, content, operator = "Jenny") {
      if (!row) return;
      if (!Array.isArray(row.logs)) row.logs = [];
      row.logs.unshift({ operator, time: nowStamp(), content });
    }

    function formatAmount(v) {
      const n = Number(v);
      if (!Number.isFinite(n)) return "";
      return `$${Number.isInteger(n) ? n : n.toFixed(2)}`;
    }

    function generatedCouponName(type, amount) {
      const displayAmount = typeof amount === "number" ? formatAmount(amount) : formatAmount(parseMoney(amount));
      if (!type || !displayAmount) return "";
      const templateMap = {
        "现金红包": "{amount}现金红包",
        "手续费抵扣红包": "{amount}手续费抵扣红包",
        "盈亏抵扣红包": "{amount}盈亏抵扣红包",
        "提现免佣券": "{amount}提现免佣券"
      };
      return (templateMap[type] || "{amount}{type}").replace("{amount}", displayAmount).replace("{type}", type);
    }

    function couponTitle(coupon) {
      if (!coupon) return "--";
      return generatedCouponName(coupon.type, coupon.amount) || coupon.name || "--";
    }

    function findCouponByKeyword(keyword) {
      const text = String(keyword || "").trim();
      if (!text) return null;
      return state.data.coupons.find(c => c.id === text)
        || state.data.coupons.find(c => couponTitle(c) === text || c.name === text)
        || state.data.coupons.find(c => c.id.includes(text) || couponTitle(c).includes(text) || String(c.name || "").includes(text))
        || null;
    }

    function searchCouponsByKeyword(keyword) {
      const text = String(keyword || "").trim();
      if (!text) return [];
      return state.data.coupons
        .filter(c => c.enabled)
        .filter(c => c.id.includes(text) || couponTitle(c).includes(text) || String(c.name || "").includes(text))
        .slice(0, 8);
    }

    function findTaskByKeyword(keyword) {
      const text = String(keyword || "").trim();
      if (!text) return null;
      const enabled = state.data.tasks.filter(t => t.enabled !== false);
      return enabled.find(t => t.id === text)
        || enabled.find(t => t.name === text)
        || enabled.find(t => t.id.includes(text) || String(t.name || "").includes(text))
        || null;
    }

    function searchTasksByKeyword(keyword) {
      const text = String(keyword || "").trim();
      if (!text) return [];
      return state.data.tasks
        .filter(t => t.enabled !== false)
        .filter(t => t.id.includes(text) || String(t.name || "").includes(text))
        .slice(0, 8);
    }

    function couponTitleFromRecord(record) {
      if (!record || record.coupon === "--") return "--";
      return generatedCouponName(record.couponType, record.amount) || record.coupon || "--";
    }

    function auditCouponTitle(record) {
      if (!record || record.coupon === "--") return "--";
      return generatedCouponName("现金红包", record.singleAmount || record.amount) || record.coupon || "--";
    }

    function nextCouponId(project) {
      const prefix = project === "TW" ? "2" : "1";
      const ids = state.data.coupons
        .map(c => String(c.id))
        .filter(id => id.startsWith(prefix))
        .map(id => Number(id))
        .filter(Number.isFinite);
      if (!ids.length) return project === "TW" ? "2001" : "1001";
      return String(Math.max(...ids) + 1);
    }

    function openCouponCreateModal(mode = "create", sourceId = "") {
      const source = state.data.coupons.find(c => c.id === sourceId);
      const baseDraft = source ? {
        project: source.project,
        name: generatedCouponName(source.type, source.amount),
        type: source.type,
        amount: String(parseMoney(source.amount)),
        ratio: couponSupportsRatio(source) ? String(source.ratio ?? "100") : "",
        validDays: source.validDays || "7"
      } : {
        project: "",
        name: "",
        type: "",
        amount: "",
        ratio: "",
        validDays: "7"
      };
      state.couponModal = { mode, sourceId, draft: baseDraft };
      switchPage("coupon-create-modal");
    }

    function validateCampaignDraft(draft) {
      if (!draft.name) return "活动名称必填";
      if (!draft.project) return "项目必填";
      if (draft.audienceType === "添加" && !(draft.sidList || []).length) return "请至少添加一个有效SID";
      if (draft.audienceType === "添加" && draft.saveAsTagVerse && !draft.tagVerseName) return "请填写新的TagVerse名称";
      if (draft.audienceType === "TagVerse" && !draft.tagVerseName && !(draft.sidList || []).length) return "请选择或创建TagVerse人群包";
      if (draft.audienceType === "导入" && !(draft.sidList || []).length) return "请先导入有效名单";
      if (!draft.taskItems.length) return "请至少添加一个任务或自定义红包";
      if (draft.taskItems.length > MAX_CAMPAIGN_TASKS) return `单个活动最多添加${MAX_CAMPAIGN_TASKS}个任务（含自定义红包任务）`;
      if (draft.taskItems.some(item => item.custom && !item.amount)) return "自定义红包金额必填";
      if (draft.deliverType === "定时发放" && !draft.deliverAt) return "请填写定时发放时间";
      if (draft.deliverType === "循环发放" && draft.loopFreq !== "每日" && !draft.loopPoint) return "循环发放需选择每周几/每月几号";
      if (draft.deliverType === "循环发放" && !draft.loopTime) return "循环发放需填写发送时间";
      if (draft.notifyEnabled && !draft.notifyTemplate) return "请选择推送模板";
      if (draft.notifyEnabled && draft.notifyType === "定时通知" && !draft.notifyAt) return "定时通知需填写通知时间";
      if (draft.reminderEnabled && !draft.reminderTemplate) return "临期提醒需选择模板";
      if (draft.reminderEnabled && draft.reminderType === "定时通知" && !draft.reminderTime) return "定时临期提醒需填写提醒时间";
      if (state.data.campaigns.some(c => c.name === draft.name)) return "活动名称不能重复";
      if (draft.activityType === "特批活动" && state.role !== "super") return "特批活动仅超级运营可提交";
      if (draft.activityType === "特批活动" && !draft.approvalReason) return "特批活动需填写申请原因";
      return "";
    }

    function isCampaignDraftDirty(draft = state.campaignDraft) {
      const d = draft || {};
      if ((d.name || "").trim()) return true;
      if ((d.project || "").trim()) return true;
      if ((d.activityType || "普通活动") !== "普通活动") return true;
      if ((d.approvalReason || "").trim()) return true;
      if ((d.audienceType || "添加") !== "添加") return true;
      if ((d.sidInput || "").trim()) return true;
      if ((d.sidList || []).length) return true;
      if ((d.tagVerseName || "").trim()) return true;
      if (d.saveAsTagVerse) return true;
      if ((d.importedFileName || "").trim()) return true;
      if ((d.importFailures || []).length) return true;
      if ((d.taskKeyword || "").trim()) return true;
      if ((d.taskItems || []).length) return true;
      if ((d.deliverType || "立即发放") !== "立即发放") return true;
      if ((d.deliverAt || "").trim()) return true;
      if (d.notifyEnabled || d.reminderEnabled) return true;
      if ((d.notifyTemplate || "").trim() || (d.reminderTemplate || "").trim()) return true;
      return false;
    }

        footer: `<button class="${btnClass(false,true)}" data-close-modal>继续编辑</button><button id="confirmLeaveCampaignForm" class="h-9 px-4 rounded bg-[#ef4444] text-white font-semibold whitespace-nowrap shrink-0">确认返回</button>`

              <div class="text-[12px] text-[#64748b] mt-1">红包标题来自红包标题多语言模板；红包描述来自描述模板或当前任务副本。</div>
            </div>
