          footer: `<button class="${btnClass(false,true)}" data-close-modal>关闭</button>`
        });
      } else if (pageId === "coupon-log-modal") {
        const c = state.data.coupons.find(x => x.id === state.selectedCouponId) || state.data.coupons[0];
        openModal({
          title: `${c.id}  ${couponTitle(c)}`,
          body: `<div class="border border-line rounded overflow-auto"><table class="w-full text-[12px]"><thead class="bg-[#f3f5fa]"><tr><th class="text-left px-3 py-2">操作人</th><th class="text-left px-3 py-2">操作时间</th><th class="text-left px-3 py-2">操作内容</th></tr></thead><tbody>${(c.logs || []).map(row => `<tr class="border-t border-line"><td class="px-3 py-2">${row.operator}</td><td class="px-3 py-2">${formatDisplayTime(row.time)}</td><td class="px-3 py-2">${row.content}</td></tr>`).join("")}</tbody></table></div><div class="mt-4 text-muted">共 ${(c.logs || []).length} 条</div>`,
          footer: `<button class="${btnClass(true,true)}" data-close-modal>关闭</button>`
        });
      } else if (pageId === "task-log-modal") {
        const t = state.data.tasks.find(x => x.id === state.selectedTaskId) || state.data.tasks[0];
        openModal({
          title: `${t.id}  ${t.name}`,
          body: `<div class="border border-line rounded overflow-auto"><table class="w-full text-[12px]"><thead class="bg-[#f3f6fb]"><tr><th class="text-left px-3 py-2">操作人</th><th class="text-left px-3 py-2">操作时间</th><th class="text-left px-3 py-2">操作内容</th></tr></thead><tbody>${(t.logs || []).map(row => `<tr class="border-t border-line"><td class="px-3 py-2">${row.operator}</td><td class="px-3 py-2">${formatDisplayTime(row.time)}</td><td class="px-3 py-2">${row.content}</td></tr>`).join("")}</tbody></table></div><div class="mt-4 text-muted">共 ${(t.logs || []).length} 条</div>`,
          footer: `<button class="${btnClass(false,true)}" data-close-modal>关闭</button>`
        });
      } else if (["coupon-log-modal","campaign-log-modal","batch-log-modal"].includes(pageId)) {
        const titleMap = {
          "task-log-modal": "任务操作日志",
          "campaign-log-modal": "活动操作日志",
          "batch-log-modal": "任务批次操作日志"
        };
        const campaign = pageId === "campaign-log-modal" ? state.data.campaigns.find(x => x.id === state.selectedCampaignId) : null;
        const batch = pageId === "batch-log-modal" ? state.data.batches.find(x => x.id === state.selectedBatchId) : null;
        const logTitle = campaign ? `${campaign.id} ${campaign.name}` : batch ? `${batch.id} ${batchTask(batch).name || "--"}` : titleMap[pageId];
        const logs = (campaign?.logs || batch?.logs) || [
          { operator:"Jenny", time:"25-06-2026 10:26", content:"新增记录" },
          { operator:"Tom", time:"25-06-2026 11:10", content:"编辑配置" },
          { operator:"Mia", time:"25-06-2026 13:42", content:"状态变更" }
        ];
        openModal({ title: logTitle, body: `<div class="border border-line rounded overflow-auto"><table class="w-full text-[12px]"><thead class="bg-[#f8faff]"><tr><th class="text-left px-3 py-2">操作人</th><th class="text-left px-3 py-2">操作时间</th><th class="text-left px-3 py-2">操作内容</th></tr></thead><tbody>${logs.map(row => `<tr class="border-t border-line"><td class="px-3 py-2">${row.operator}</td><td class="px-3 py-2">${formatDisplayTime(row.time)}</td><td class="px-3 py-2">${row.content}</td></tr>`).join("")}</tbody></table></div><div class="mt-4 text-muted">共 ${logs.length} 条</div>`, footer: `<button class="${btnClass(false,true)}" data-close-modal>关闭</button>` });
      } else if (["audit-redpacket","audit-custom","audit-special"].includes(pageId)) {
        const titleMap = {
          "audit-redpacket": "领取审核",
          "audit-custom": "发放审核",
          "audit-special": "发放审核"
        };
        openModal({ title: titleMap[pageId], body: `<div class="grid grid-cols-2 gap-3 text-[12px]"><input class="border border-line rounded px-2 py-2 bg-gray-50" value="审核类型：${titleMap[pageId]}" disabled><input class="border border-line rounded px-2 py-2 bg-gray-50" value="项目：Dana" disabled><input class="border border-line rounded px-2 py-2 bg-gray-50" value="涉及人数：120" disabled><input class="border border-line rounded px-2 py-2 bg-gray-50" value="金额：$14,000" disabled><input class="col-span-2 border border-line rounded px-2 py-2 bg-gray-50" value="触发原因：阈值命中" disabled><select id="auditModalResult" class="border border-line rounded px-2 py-2"><option>通过</option><option>拒绝</option></select><input id="auditModalReason" class="border border-line rounded px-2 py-2" placeholder="拒绝原因（拒绝时必填）"></div>`, footer: `<button class="${btnClass(false,true)}" data-close-modal>取消</button><button id="confirmAuditModalAction" class="${btnClass(true,true)}">确认审核</button>` });
      } else {
        openModal({ title: "页面弹窗", body: `<p>${pageId} 已映射到弹窗视图。</p>`, footer: `<button class="${btnClass(false,true)}" data-close-modal>关闭</button>` });
      }
      bindModalClose();
    }

    function renderCurrentPage() {
      if (state.loading) return renderLoading();
      const p = state.pageId;
      const modalPages = [
        "coupon-create-modal","coupon-toggle-modal","coupon-log-modal",
        "task-create-modal","task-toggle-modal","task-detail-modal","task-lang-modal","task-lang-view-modal","task-log-modal",
        "campaign-tagverse-modal","campaign-tagverse-detail-modal","campaign-revoke-modal","campaign-log-modal",
        "batch-log-modal","audit-redpacket","audit-custom","audit-special","audit-batch-modal"
      ];
      if (modalPages.includes(p)) {
        renderModalPage(p);
        // fallback content keep previous context visible
        if (state.mainTab === "task") renderTaskList();
        else if (state.mainTab === "coupon") renderCouponList();
        else if (state.mainTab === "campaign") renderCampaignRecord();
        else if (state.mainTab === "batch") renderBatchList();
        else if (state.mainTab === "audit") renderAuditList();
        else if (state.mainTab === "consume") renderConsumeList();
        return;
      }
      if (p === "task-list") return renderTaskList();
      if (p === "task-create-none" || p === "task-create-trade" || p === "task-create-finance") return renderTaskList();
      if (p === "coupon-list") return renderCouponList();
      if (p === "campaign-record") return renderCampaignRecord();
      if (p === "campaign-form" || p === "campaign-tagverse" || p === "campaign-import") return renderCampaignForm();
      if (p === "campaign-detail" || p === "campaign-view-tagverse" || p === "campaign-view-list") return renderCampaignDetail();
      if (p === "batch-list") return renderBatchList();
      if (p === "batch-detail") return renderBatchDetail();
      if (p === "user-coupon-detail") return renderUserCouponDetail();
      if (p === "consume-list") return renderConsumeList();
      if (p === "audit-list" || p === "audit-config") return p === "audit-config" ? renderAuditList() : renderAuditList();
      // default
      el.query.innerHTML = querySection(`<div class="text-[12px] text-muted">${p} 页面占位</div>`);
      el.action.innerHTML = "";
      el.table.innerHTML = `<div class="border border-dashed border-line rounded p-12 text-center text-sm text-muted">页面占位</div>`;
    }

    function bindPageActions() {
      // Task filters
      const taskSearch = document.getElementById("btnTaskSearch");
      if (taskSearch) {
        taskSearch.onclick = () => {
          withLoading(() => {
            state.filters.task.id = document.getElementById("qTaskId").value.trim();
            state.filters.task.name = document.getElementById("qTaskName").value.trim();
            state.filters.task.type = document.getElementById("qTaskType").value.trim();
            state.filters.task.app = document.getElementById("qTaskApp").value.trim();
            state.filters.task.status = document.getElementById("qTaskStatus").value.trim();
          }, "查询完成");
        };
        document.getElementById("btnTaskReset").onclick = () => { state.filters.task = { id:"", name:"", type:"", app:"", status:"" }; render(); notify("warn","已重置筛选条件"); };
        document.getElementById("btnTaskCreate").onclick = () => openTaskModal("create");
        document.querySelectorAll("[data-task-detail]").forEach(btn => {
          btn.onclick = () => {
            state.selectedTaskId = btn.dataset.taskDetail;
            switchPage("task-detail-modal");
          };
        });
        document.querySelectorAll("[data-task-edit]").forEach(btn => {
          btn.onclick = () => openTaskModal("edit", btn.dataset.taskEdit);
        });
        document.querySelectorAll("[data-task-campaign]").forEach(btn => {
          btn.onclick = () => {
            const task = state.data.tasks.find(t => t.id === btn.dataset.taskCampaign);
            if (task) {
              state.campaignDraft.project = task.app || "";
              state.campaignDraft.taskKeyword = "";
              state.campaignDraft.taskItems = [campaignItemFromTask(task)];
            }
            switchPage("campaign-form", { mainTab: "campaign" });
            notify("success", "已跳转至活动发放页面，并自动选择该任务");
          };
        });
        document.querySelectorAll("[data-task-log]").forEach(btn => {
          btn.onclick = () => {
            state.selectedTaskId = btn.dataset.taskLog;
            switchPage("task-log-modal");
          };
        });
        document.querySelectorAll("[data-task-toggle]").forEach(btn => {
          btn.onclick = () => {
            const row = state.data.tasks.find(r => r.id === btn.dataset.taskToggle);
            if (!row) return;
            state.selectedTaskId = row.id;
            switchPage("task-toggle-modal");
            setTimeout(() => {
              const confirmBtn = document.querySelector("#modalFooter button:last-child");
              if (!confirmBtn) return;
              confirmBtn.onclick = () => {
                row.enabled = !row.enabled;
                row.status = row.enabled ? "启用" : "禁用";
                row.updatedAt = nowStamp();
                pushTaskLog(row, `${row.status}任务，状态变更为“${row.status}”`);
                closeModal();
                notify("success", `任务 ${row.id} 已${row.status}`);
                switchPage("task-list");
              };
            }, 0);
          };
        });
      }
      const taskProject = document.getElementById("taskProject");
      if (taskProject) {
        taskProject.onchange = () => {
          saveCurrentTaskDraft();
          state.taskModal.draft.app = taskProject.value;
          normalizeTaskDraft(state.taskModal.draft);
          switchPage("task-create-modal");
        };
      }
      const taskType = document.getElementById("taskType");
      if (taskType) {
        taskType.onchange = () => {
          saveCurrentTaskDraft();
          state.taskModal.draft.type = taskType.value;
          normalizeTaskDraft(state.taskModal.draft);
          switchPage("task-create-modal");
        };
      }
      const taskJumpType = document.getElementById("taskJumpType");
      if (taskJumpType) {
        taskJumpType.onchange = () => {
          saveCurrentTaskDraft();
          state.taskModal.draft.jumpType = taskJumpType.value;
          switchPage("task-create-modal");
        };
      }
      const taskValidType = document.getElementById("taskValidType");
      if (taskValidType) {
        taskValidType.onchange = () => {
          saveCurrentTaskDraft();
          state.taskModal.draft.taskValidType = taskValidType.value;
          switchPage("task-create-modal");
        };
      }
      const taskCouponAddInput = document.getElementById("taskCouponAddInput");
      const taskCouponSearchDropdown = document.getElementById("taskCouponSearchDropdown");
      if (taskCouponAddInput && taskCouponSearchDropdown) {
        const renderCouponSearchDropdown = () => {
          const rows = searchCouponsByKeyword(taskCouponAddInput.value);
          if (!rows.length) {
            taskCouponSearchDropdown.innerHTML = `<div class="px-3 py-2 text-[12px] text-[#94a3b8]">暂无匹配红包</div>`;
          } else {
            taskCouponSearchDropdown.innerHTML = rows.map(c => `
              <button type="button" class="w-full px-3 py-2 text-left hover:bg-[#f8fbff] border-b border-line/60 last:border-b-0" data-pick-task-coupon="${c.id}">
                <div class="flex items-center justify-between gap-3">
                  <span class="font-medium text-[#1f2a44]">${couponTitle(c)}</span>
                  <span class="text-[#64748b]">${c.id}</span>
                </div>
                <div class="mt-1 text-[11px] text-[#64748b]">${c.type} / ${c.amount} / 抵扣比例 ${couponRatioText(c)} / ${couponValidDaysText(c.validDays)} / ${c.status}</div>
              </button>
            `).join("");
          }
          taskCouponSearchDropdown.classList.remove("hidden");
          taskCouponSearchDropdown.querySelectorAll("[data-pick-task-coupon]").forEach(btn => {
            btn.onmousedown = (event) => event.preventDefault();
            btn.onclick = () => {
              const coupon = state.data.coupons.find(c => c.id === btn.dataset.pickTaskCoupon);
              taskCouponAddInput.value = coupon ? couponTitle(coupon) : btn.dataset.pickTaskCoupon;
              taskCouponSearchDropdown.classList.add("hidden");
            };
          });
        };
        taskCouponAddInput.oninput = renderCouponSearchDropdown;
        taskCouponAddInput.onfocus = () => {
          if (taskCouponAddInput.value.trim()) renderCouponSearchDropdown();
        };
        taskCouponAddInput.onblur = () => setTimeout(() => taskCouponSearchDropdown.classList.add("hidden"), 120);
      }
      const btnTaskAddCouponDemo = document.getElementById("btnTaskAddCouponDemo");
      if (btnTaskAddCouponDemo) {
        btnTaskAddCouponDemo.onclick = () => {
          saveCurrentTaskDraft();
          const d = state.taskModal.draft;
          const keyword = document.getElementById("taskCouponAddInput")?.value.trim();
          if (!keyword) return notify("error", "请输入要添加的红包ID或红包标题");
          const selected = taskCouponIdsFromText(d.couponsText);
          if (d.type !== "无任务" && selected.length >= 1) return notify("warn", "该任务类型一次只能添加一个红包");
          if (selected.length >= MAX_TASK_COUPONS) return notify("warn", `单个任务最多添加${MAX_TASK_COUPONS}个红包（按数量累计）`);
          const coupon = findCouponByKeyword(keyword);
          if (!coupon) return notify("error", "未找到匹配红包，请输入红包ID或红包标题");
          if (!coupon.enabled) return notify("error", "只能添加启用状态的红包");
          state.taskModal.draft.couponsText = [state.taskModal.draft.couponsText, coupon.id].filter(Boolean).join(state.taskModal.draft.couponsText ? "," : "");
          switchPage("task-create-modal");
        };
      }
      const btnTaskCreateCouponFromTask = document.getElementById("btnTaskCreateCouponFromTask");
      if (btnTaskCreateCouponFromTask) {
        btnTaskCreateCouponFromTask.onclick = () => {
          saveCurrentTaskDraft();
          const selected = taskCouponIdsFromText(state.taskModal.draft.couponsText);
          if (state.taskModal.draft.type !== "无任务" && selected.length >= 1) return notify("warn", "该任务类型一次只能添加一个红包");
          if (selected.length >= MAX_TASK_COUPONS) return notify("warn", `单个任务最多添加${MAX_TASK_COUPONS}个红包（按数量累计）`);
          state.taskModal.returnAfterCouponCreate = true;
          openCouponCreateModal("create");
        };
      }
      document.querySelectorAll("[data-task-coupon-remove]").forEach(btn => {
        btn.onclick = () => {
          saveCurrentTaskDraft();
          const removeId = btn.dataset.taskCouponRemove;
          state.taskModal.draft.couponsText = state.taskModal.draft.couponsText
            .split(",")
            .map(x => x.trim())
            .filter(id => id && id !== removeId)
            .join(",");
          if (state.taskModal.draft.langConfigs) delete state.taskModal.draft.langConfigs[removeId];
          switchPage("task-create-modal");
        };
      });
      document.querySelectorAll("[data-task-coupon-inc]").forEach(btn => {
        btn.onclick = () => {
          saveCurrentTaskDraft();
          const id = btn.dataset.taskCouponInc;
          if (state.taskModal.draft.type !== "无任务") return notify("warn", "该任务类型红包数量只能为1");
          const total = taskCouponIdsFromText(state.taskModal.draft.couponsText).length;
          if (total >= MAX_TASK_COUPONS) return notify("warn", `单个任务最多添加${MAX_TASK_COUPONS}个红包（按数量累计）`);
          const count = taskCouponIdsFromText(state.taskModal.draft.couponsText).filter(x => x === id).length;
          setTaskCouponQuantity(id, count + 1);
          switchPage("task-create-modal");
        };
      });
      document.querySelectorAll("[data-task-coupon-dec]").forEach(btn => {
        btn.onclick = () => {
          saveCurrentTaskDraft();
          const id = btn.dataset.taskCouponDec;
          const count = taskCouponIdsFromText(state.taskModal.draft.couponsText).filter(x => x === id).length;
          setTaskCouponQuantity(id, count - 1);
          switchPage("task-create-modal");
        };
      });
      document.querySelectorAll("[data-task-coupon-config]").forEach(btn => {
        btn.onclick = () => {
          saveCurrentTaskDraft();
          openTaskCouponConfigStacked(btn.dataset.taskCouponConfig);
        };
      });
      const btnFinanceLangConfig = document.getElementById("btnFinanceLangConfig");
      if (btnFinanceLangConfig) {
        btnFinanceLangConfig.onclick = () => {
          saveCurrentTaskDraft();
          openTaskCouponConfigStacked("FINANCE");
        };
      }
      const btnSaveTaskModal = document.getElementById("btnSaveTaskModal");
      if (btnSaveTaskModal) {
        btnSaveTaskModal.onclick = () => {
          saveCurrentTaskDraft();
          const d = state.taskModal.draft;
          const err = validateTaskDraft(d);
          if (err) return notify("error", err);
          normalizeTaskDraft(d);
          const coupons = d.type === "理财" ? [] : d.couponsText.split(",").map(x => x.trim()).filter(Boolean);
          if (!d.langConfigs) d.langConfigs = {};
          if (d.type === "理财") {
            if (!d.langConfigs.FINANCE) d.langConfigs.FINANCE = defaultTaskCouponConfig("FINANCE", d);
          } else {
            Array.from(new Set(coupons)).forEach(id => {
              if (!d.langConfigs[id]) d.langConfigs[id] = defaultTaskCouponConfig(id, d);
            });
          }
          if (state.taskModal.mode === "edit") {
            const row = state.data.tasks.find(t => t.id === state.taskModal.sourceId);
            if (!row) return notify("error", "未找到要编辑的任务");
            row.name = d.name;
            row.type = d.type;
            row.app = d.app;
            row.condition = taskConditionFromDraft(d);
            row.coupons = coupons;
            row.taskValidType = d.type === "无任务" ? "" : d.taskValidType;
            row.taskValidDays = d.type === "无任务" ? "" : d.taskValidDays;
            row.taskValidStart = d.type === "无任务" ? "" : d.taskValidStart;
            row.taskValidEnd = d.type === "无任务" ? "" : d.taskValidEnd;
            row.jumpType = d.type === "无任务" ? "" : d.jumpType;
            row.appJump = d.type === "无任务" ? "" : (d.jumpType === "URL链接" ? (d.jumpUrl || "") : (d.appJump || ""));
            row.jumpUrl = d.type === "无任务" || d.jumpType !== "URL链接" ? "" : (d.jumpUrl || "");
            row.couponRatios = d.type === "理财" ? {} : { ...(d.couponRatios || {}) };
            row.langConfigs = JSON.parse(JSON.stringify(d.langConfigs || {}));
            row.updatedAt = nowStamp();
            pushTaskLog(row, "编辑任务，更新基础信息、任务配置和关联红包");
            notify("success", "任务编辑成功");
          } else {
            const row = {
              id: nextTaskId(),
              name: d.name,
              type: d.type,
              app: d.app,
              condition: taskConditionFromDraft(d),
              coupons,
              taskValidType: d.type === "无任务" ? "" : d.taskValidType,
              taskValidDays: d.type === "无任务" ? "" : d.taskValidDays,
              taskValidStart: d.type === "无任务" ? "" : d.taskValidStart,
              taskValidEnd: d.type === "无任务" ? "" : d.taskValidEnd,
              jumpType: d.type === "无任务" ? "" : d.jumpType,
              appJump: d.type === "无任务" ? "" : (d.jumpType === "URL链接" ? (d.jumpUrl || "") : (d.appJump || "")),
              jumpUrl: d.type === "无任务" || d.jumpType !== "URL链接" ? "" : (d.jumpUrl || ""),
              couponRatios: d.type === "理财" ? {} : { ...(d.couponRatios || {}) },
              langConfigs: JSON.parse(JSON.stringify(d.langConfigs || {})),
              status: "启用",
              enabled: true,
              updatedAt: nowStamp(),
              logs: []
            };
            pushTaskLog(row, `新增任务，关联红包 ${formatTaskCoupons(coupons)}`);
            state.data.tasks.unshift(row);
            notify("success", "任务新增成功");
          }
          closeModal();
          switchPage("task-list");
        };
      }

      // Coupon filters
      const couponSearch = document.getElementById("btnCouponSearch");
      if (couponSearch) {
        couponSearch.onclick = () => {
          withLoading(() => {
            state.filters.coupon.id = document.getElementById("qCouponId").value.trim();
            state.filters.coupon.name = document.getElementById("qCouponName").value.trim();
            state.filters.coupon.type = document.getElementById("qCouponType").value.trim();

            amount: ""
          });
          render();
        };
        document.querySelectorAll("[data-remove-campaign-item]").forEach(btn => btn.onclick = () => {
          syncDraft();
          state.campaignDraft.taskItems.splice(Number(btn.dataset.removeCampaignItem), 1);
          render();
        });
        document.getElementById("btnCampaignSubmit").onclick = () => {
          syncDraft();
          const err = validateCampaignDraft(state.campaignDraft);
          if (err) return notify("error", err);
          createCampaignFromDraft(state.campaignDraft);
          resetCampaignDraft();
          notify("success", "提交成功");
          switchPage("campaign-record", { skipHistory: true, mainTab: "campaign" });
        };
      }
      const campaignDetailBack = document.getElementById("btnCampaignDetailBack");
      if (campaignDetailBack) {
        campaignDetailBack.onclick = () => goBack("campaign-record", "campaign");
        document.getElementById("btnCampaignDetailCopy").onclick = () => {
          const src = state.data.campaigns.find(x => x.id === state.selectedCampaignId);
          if (src) pushCampaignLog(src, "复制活动配置，打开新建活动发放页面");
          notify("success", "已复制活动配置并跳转至活动发放");
          switchPage("campaign-form");
        };
        document.getElementById("btnCampaignDetailRevoke").onclick = () => switchPage("campaign-revoke-modal");
      }

      // Batch filters
      const batchSearch = document.getElementById("btnBatchSearch");
      if (batchSearch) {
        batchSearch.onclick = () => {
          withLoading(() => {
            state.filters.batch.campaignId = document.getElementById("qBatchCampaign").value.trim();
            state.filters.batch.activityName = document.getElementById("qBatchActivityName").value.trim();
            state.filters.batch.project = document.getElementById("qBatchProject").value.trim();
            state.filters.batch.region = document.getElementById("qBatchRegion").value.trim();
            state.filters.batch.status = document.getElementById("qBatchStatus").value.trim();
            state.filters.batch.start = document.getElementById("qBatchStart").value.trim();
            state.filters.batch.end = document.getElementById("qBatchEnd").value.trim();
          }, "查询完成");
        };
        document.getElementById("btnBatchReset").onclick = () => { state.filters.batch = { campaignId:"", activityName:"", project:"", region:"", status:"", start:"", end:"" }; render(); notify("warn","已重置筛选条件"); };
        document.querySelectorAll("[data-batch-detail]").forEach(btn => btn.onclick = () => {
          state.selectedBatchId = btn.dataset.batchDetail;
          switchPage("batch-detail");
        });
        document.querySelectorAll("[data-export-batch]").forEach(btn => btn.onclick = () => notify("success", `已生成EDM名单：${btn.dataset.exportBatch}`));
        document.querySelectorAll("[data-batch-log]").forEach(btn => btn.onclick = () => {
          state.selectedBatchId = btn.dataset.batchLog;
          switchPage("batch-log-modal");
        });
      }
      const batchDetailBack = document.getElementById("btnBatchDetailBack");
      if (batchDetailBack) {
        batchDetailBack.onclick = () => goBack("batch-list", "batch");
        const batchDetailExport = document.getElementById("btnBatchDetailExport");
        if (batchDetailExport) batchDetailExport.onclick = () => notify("success", "已生成EDM名单（演示）");
        const syncBatchDetailFilter = () => {
          state.batchDetailFilter.sid = document.getElementById("qBatchDetailSid")?.value.trim() || "";
          state.batchDetailFilter.couponId = document.getElementById("qBatchDetailCouponId")?.value || "";
          state.batchDetailFilter.status = document.getElementById("qBatchDetailStatus")?.value || "发放成功";
        };
        document.getElementById("btnBatchDetailSearch").onclick = () => {
          syncBatchDetailFilter();
          render();
          notify("success", "已按条件刷新明细");
        };
        ["qBatchDetailStatus", "qBatchDetailCouponId"].forEach(id => {
          const node = document.getElementById(id);
          if (!node) return;
          node.onchange = () => {
            syncBatchDetailFilter();
            render();
          };
        });
        document.getElementById("btnBatchDetailReset").onclick = () => {
          const batch = state.data.batches.find(x => x.id === (state.selectedBatchId || state.filters.batch.campaignId)) || state.data.batches[0];
          const firstCouponId = batchCouponRows(batch)[0]?.id || "";
          state.batchDetailFilter = { sid: "", couponId: firstCouponId, status: "发放成功" };
          render();
          notify("warn", "已重置筛选条件");
        };
      }

      document.querySelectorAll("[data-task-detail-coupon-config]").forEach(btn => btn.onclick = () => {
        openReadonlyTaskCouponConfig(btn.dataset.taskDetailSource || state.selectedTaskId, btn.dataset.taskDetailCouponConfig);
      });

      // Consume filters
      const consumeSearch = document.getElementById("btnConsumeSearch");
      if (consumeSearch) {
        consumeSearch.onclick = () => {
          withLoading(() => {
            state.filters.consume.project = document.getElementById("qConsumeProject").value.trim();
            state.filters.consume.couponId = document.getElementById("qConsumeCouponId").value.trim();
            state.filters.consume.region = document.getElementById("qConsumeRegion").value.trim();
            state.filters.consume.operator = document.getElementById("qConsumeOperator").value.trim();
            state.filters.consume.start = document.getElementById("qConsumeStart").value.trim();
            state.filters.consume.end = document.getElementById("qConsumeEnd").value.trim();
          }, "查询完成");
        };
        document.getElementById("btnConsumeReset").onclick = () => {
          state.filters.consume = { project: "", couponId: "", region: "", operator: "", start: "2026-05-01 00:00:00", end: "2026-05-30 23:59:59" };
          render();
          notify("warn", "已重置筛选条件");
        };
      }

      // Audit filters/actions
      const userCouponBack = document.getElementById("btnUserCouponBack");
      if (userCouponBack) {
        userCouponBack.onclick = () => { state.auditTab = "receive"; goBack("audit-list", "audit"); };
      }

      // Audit filters/actions
      const auditSearch = document.getElementById("btnAuditSearch");
      if (auditSearch) {
        document.querySelectorAll("[data-audit-tab]").forEach(btn => btn.onclick = () => {
          state.auditTab = btn.dataset.auditTab;
          state.selectedRows.clear();
          state.columnConfigOpen = "";
          render();
        });
        auditSearch.onclick = () => {
          withLoading(() => {
            const next = emptyAuditFilters();
            next.project = document.getElementById("qAuditProject")?.value.trim() || "";
            next.couponId = document.getElementById("qAuditCouponId")?.value.trim() || "";
            next.status = document.getElementById("qAuditStatus")?.value.trim() || "";
            next.reviewStart = document.getElementById("qAuditReviewStart")?.value.trim() || "";
            next.reviewEnd = document.getElementById("qAuditReviewEnd")?.value.trim() || "";
            if (state.auditTab === "usage" || state.auditTab === "receive") {
              next.sid = document.getElementById("qAuditSid")?.value.trim() || "";
              next.couponType = document.getElementById("qAuditCouponType")?.value || "";
              next.region = document.getElementById("qAuditRegion")?.value || "";
              next.auditMethod = document.getElementById("qAuditMethod")?.value || "";
            }
            if (state.auditTab === "usage") {
              next.mt4Order = document.getElementById("qAuditMt4Order")?.value.trim() || "";
              next.depositOrder = document.getElementById("qAuditDepositOrder")?.value.trim() || "";
            } else {
              next.object = document.getElementById("qAuditObject")?.value.trim() || "";
              next.start = document.getElementById("qAuditStart")?.value.trim() || "";
              next.end = document.getElementById("qAuditEnd")?.value.trim() || "";
            }
            state.filters.audit = next;
          }, "查询完成");
        };
        document.getElementById("btnAuditReset").onclick = () => { state.filters.audit = emptyAuditFilters(); render(); notify("warn","已重置筛选条件"); };
        const colConfigBtn = document.getElementById("btnColumnConfig");
        if (colConfigBtn) {
          colConfigBtn.onclick = () => openColumnConfigModal(colConfigBtn.dataset.colConfig || (state.auditTab === "usage" ? "usage" : "receive"));
        }
        const selectAllAudits = document.getElementById("selectAllAudits");
        if (selectAllAudits) {
          selectAllAudits.onchange = () => {
            document.querySelectorAll("[data-select-audit]").forEach(chk => {
              chk.checked = selectAllAudits.checked;
              if (selectAllAudits.checked) state.selectedRows.add(chk.dataset.selectAudit);
              else state.selectedRows.delete(chk.dataset.selectAudit);
            });
          };
        }
        document.querySelectorAll("[data-select-audit]").forEach(chk => chk.onchange = () => {
          if (chk.checked) state.selectedRows.add(chk.dataset.selectAudit);
          else state.selectedRows.delete(chk.dataset.selectAudit);
          const checks = [...document.querySelectorAll("[data-select-audit]")];
          const allChecked = checks.length > 0 && checks.every(item => item.checked);
          const selectAll = document.getElementById("selectAllAudits");
          if (selectAll) selectAll.checked = allChecked;
        });
        const openBatchAuditModal = document.getElementById("btnOpenBatchAuditModal");
        if (openBatchAuditModal) openBatchAuditModal.onclick = () => {
          if (!roleGuard("批量审核")) return;
          openBatchAuditReviewModal();
        };
        document.querySelectorAll("[data-audit-review]").forEach(btn => btn.onclick = () => {
          if (!roleGuard("审核")) return;
          openAuditReviewModal(btn.dataset.auditReview);
        });
        document.querySelectorAll("[data-audit-pass]").forEach(btn => btn.onclick = () => {
          if (!roleGuard("审核")) return;
          openAuditReviewModal(btn.dataset.auditPass, "pass");
        });
        document.querySelectorAll("[data-audit-reject]").forEach(btn => btn.onclick = () => {
          if (!roleGuard("审核")) return;
          openAuditReviewModal(btn.dataset.auditReject, "reject");
        });
      }

      document.querySelectorAll("[data-nav]").forEach(link => {
        link.onclick = () => goNav(link.dataset.nav);
      });

      document.querySelectorAll("[data-campaign-task]").forEach(btn => btn.onclick = () => {
        state.selectedTaskId = btn.dataset.campaignTask;
        renderModalPage("task-detail-modal");
      });
      document.querySelectorAll("[data-batch-campaign-detail]").forEach(btn => btn.onclick = () => {
        state.selectedCampaignId = btn.dataset.batchCampaignDetail;
        switchPage("campaign-detail", { mainTab: "campaign" });
      });
      document.querySelectorAll("[data-batch-task-detail]").forEach(btn => btn.onclick = () => {
        state.selectedTaskId = btn.dataset.batchTaskDetail;
        renderModalPage("task-detail-modal");
      });
      document.querySelectorAll("[data-record-task-detail]").forEach(btn => btn.onclick = () => {
        state.selectedTaskId = btn.dataset.recordTaskDetail;
        renderModalPage("task-detail-modal");
      });
      document.querySelectorAll("[data-record-coupon-name]").forEach(btn => btn.onclick = () => {
        state.filters.coupon.name = btn.dataset.recordCouponName;
        switchPage("coupon-list", { mainTab: "coupon" });
      });
      document.querySelectorAll("[data-record-coupon-id]").forEach(btn => btn.onclick = () => {
        state.filters.coupon.id = btn.dataset.recordCouponId;
        switchPage("coupon-list", { mainTab: "coupon" });
      });
      document.querySelectorAll("[data-campaign-batch]").forEach(btn => btn.onclick = () => {
        state.selectedBatchId = btn.dataset.campaignBatch;
        switchPage("batch-detail", { mainTab: "batch" });
      });
      document.querySelectorAll("[data-campaign-audience]").forEach(btn => btn.onclick = () => {
        const row = state.data.campaigns.find(x => x.id === btn.dataset.campaignAudience);
        if (!row) return;
        state.selectedCampaignId = row.id;
        if (row.audienceType === "导入") {
          notify("success", `已下载导入名单：${row.importFile || `${row.id}_import.xlsx`}`);
          return;
        }
        if (row.audienceType === "TagVerse") {
          state.tagVerseDraft = { selected: row.audience || "Recharge_Q2", original: row.audience || "Recharge_Q2", dirty: false };
          renderModalPage("campaign-tagverse-detail-modal");
          return;
        }
        openModal({
          title: "查看发放人群",
          body: `<div class="border border-line rounded overflow-hidden"><table class="w-full text-[12px]"><thead class="bg-[#f3f6fb]"><tr><th class="text-left px-3 py-2">SID</th></tr></thead><tbody>${["10018712123","10018712124","10018712125","10018712126","10018712127"].map(sid => `<tr class="border-t border-line"><td class="px-3 py-2">${sid}</td></tr>`).join("")}</tbody></table></div>`,
          footer: `<button class="${btnClass(true,true)}" data-close-modal>关闭</button>`
        });
        bindModalClose();
      });

      const confirmCampaignRevoke = document.getElementById("confirmCampaignRevoke");
      if (confirmCampaignRevoke) confirmCampaignRevoke.onclick = () => {
        const row = state.data.campaigns.find(x => x.id === state.selectedCampaignId);
        if (row) {
          const reason = document.getElementById("revokeReason")?.value.trim();
          const loopRoot = String(row.id || "").replace(/-\d+$/, "");
          const targetCampaigns = String(row.mode || "").includes("循环")
            ? state.data.campaigns.filter(item => item.id === row.id || String(item.id || "").replace(/-\d+$/, "") === loopRoot)
            : [row];
          targetCampaigns.forEach(item => {
            item.status = "已撤销";
            item.statuses = ["已撤销"];
            item.revokeReason = reason ? `撤销原因：${reason}` : "撤销原因：运营手动撤销";
            pushCampaignLog(item, "撤销活动");
          });
          const targetCampaignIds = new Set(targetCampaigns.map(item => item.id));
          state.data.batches
            .filter(batch => targetCampaignIds.has(batch.campaign) || targetCampaigns.some(item => batch.id.startsWith(`${item.id}-`) || batch.id === item.batch))
            .forEach(batch => {
              batch.status = "已撤销";
              batch.reason = row.revokeReason;
            });
        }
        closeModal();
        switchPage("campaign-record", { skipHistory: true, mainTab: "campaign" });
        notify("warn", "活动已撤销，当前任务批次及循环计划下相关活动已同步更新");
      };
      const confirmTagVerseSave = document.getElementById("confirmTagVerseSave");
      const tagVerseHistorySelect = document.getElementById("tagVerseHistorySelect");
      if (tagVerseHistorySelect) tagVerseHistorySelect.onchange = () => {
        state.tagVerseDraft.selected = tagVerseHistorySelect.value;
        state.tagVerseDraft.original = tagVerseHistorySelect.value;
        state.tagVerseDraft.dirty = false;
        notify("success", `已反显历史TagVerse：${tagVerseHistorySelect.value}`);
      };
      document.querySelectorAll("[data-tagverse-field]").forEach(field => {
        field.onchange = () => {
          state.tagVerseDraft.dirty = true;
        };
      });
      if (confirmTagVerseSave) confirmTagVerseSave.onclick = () => {
        const selected = document.getElementById("tagVerseHistorySelect")?.value || state.tagVerseDraft.selected;
        if (!state.tagVerseDraft.dirty) {
          state.campaignDraft.tagVerseName = selected;
          closeModal();
          switchPage("campaign-form", { mainTab: "campaign", skipHistory: true });
          notify("success", "已选择历史TagVerse并反显到当前页面");
          return;
        }
        openModal({
          title: "确认创建新的TagVerse？",
          body: `<div class="space-y-4 text-[16px]"><p class="text-[#64748b]">当前配置基于历史 TagVerse「${selected}」进行了修改，系统将按新增人群包保存。请重新命名后确认。</p><label class="block font-medium">* TagVerse名称</label><input id="newTagVerseName" class="w-full border border-line rounded px-3 py-2" placeholder="TG_202606_老客激活" value="TG_202606_老客激活"></div>`,
          footer: `<button class="${btnClass(false,true)}" data-close-modal>取消</button><button id="confirmTagVerseRename" class="${btnClass(true,true)}">确认</button>`
        });
        const renameBtn = document.getElementById("confirmTagVerseRename");
        if (renameBtn) renameBtn.onclick = () => {
          const name = document.getElementById("newTagVerseName").value.trim();
          if (!name) return notify("error", "请填写TagVerse名称");
          state.campaignDraft.tagVerseName = name;
          state.tagVerseDraft = { selected: name, original: name, dirty: false };
          closeModal();
          switchPage("campaign-form", { mainTab: "campaign", skipHistory: true });
          notify("success", "新的TagVerse创建成功，并已反显到当前页面");
        };
      };
      const submitBatchAuditModal = document.getElementById("submitBatchAuditModal");
      if (submitBatchAuditModal) submitBatchAuditModal.onclick = () => {
        const result = document.getElementById("batchAuditResult").value;
        const reason = document.getElementById("batchAuditReason").value.trim();
        if (result === "拒绝" && !reason) return notify("error","批量拒绝必须填写原因");
        closeModal();
        notify("success", `批量审核${result}成功`);
      };
      const confirmAuditModalAction = document.getElementById("confirmAuditModalAction");
      if (confirmAuditModalAction) confirmAuditModalAction.onclick = () => {
        const result = document.getElementById("auditModalResult").value;
        const reason = document.getElementById("auditModalReason").value.trim();
        if (result === "拒绝" && !reason) return notify("error","拒绝原因必填");
        closeModal();
        notify("success", `审核${result}成功`);
      };

      const saveCouponModal = document.getElementById("saveCouponModal");
      if (saveCouponModal) {
        const couponTypeSelect = document.getElementById("mCouponType");
        const couponAmountInput = document.getElementById("mCouponAmount");
        const couponRatioInput = document.getElementById("mCouponRatio");
        const couponNamePreview = document.getElementById("mCouponNamePreview");
        const refreshCouponRatioField = () => {
          if (!couponRatioInput) return;
          const canEdit = couponSupportsRatio(couponTypeSelect?.value || "");
          couponRatioInput.disabled = !canEdit;
          couponRatioInput.classList.toggle("bg-gray-50", !canEdit);
          couponRatioInput.classList.toggle("text-[#94a3b8]", !canEdit);
          couponRatioInput.placeholder = canEdit ? "填写抵扣比例" : "--";
          if (!canEdit) couponRatioInput.value = "";
          else if (!couponRatioInput.value.trim()) couponRatioInput.value = "100";
          const ratioLabel = couponRatioInput.closest("div")?.parentElement?.querySelector("label");
          if (ratioLabel) ratioLabel.className = `form-label ${canEdit ? "required" : ""} mb-1`;
        };
        const refreshCouponNamePreview = () => {
          if (!couponNamePreview) return;
          const name = generatedCouponName(couponTypeSelect?.value || "", couponAmountInput?.value || "");
          couponNamePreview.textContent = name || "保存时按红包类型和金额自动生成";
          couponNamePreview.classList.toggle("text-[#0f172a]", Boolean(name));
        };
        if (couponTypeSelect) couponTypeSelect.onchange = () => {
          refreshCouponRatioField();
          refreshCouponNamePreview();
        };
        if (couponAmountInput) couponAmountInput.oninput = refreshCouponNamePreview;
        refreshCouponRatioField();
        refreshCouponNamePreview();
        saveCouponModal.onclick = () => {
        const draft = {
          project: document.getElementById("mCouponProject").value.trim(),
          name: "",
          type: document.getElementById("mCouponType").value.trim(),
          amount: document.getElementById("mCouponAmount").value.trim(),
          ratio: document.getElementById("mCouponRatio")?.value.trim() || "",
          validDays: document.getElementById("mCouponValidDays").value.trim()
        };
        if (!draft.project || !draft.type || !draft.amount || !draft.validDays) return notify("error", "请填写完整必填项");
        const amountNum = Number(draft.amount);
        if (!Number.isFinite(amountNum) || amountNum < 0) return notify("error", "红包金额只支持数字，支持小数");
        draft.name = generatedCouponName(draft.type, amountNum);
        const validDaysNum = Number(draft.validDays);
        if (!Number.isInteger(validDaysNum) || validDaysNum <= 0) return notify("error", "红包有效期只能填写有效天数，且必须为正整数");
        let ratioValue = "";
        if (couponSupportsRatio(draft.type)) {
          const ratioNum = Number(draft.ratio);
          if (!Number.isFinite(ratioNum) || ratioNum <= 0 || ratioNum > 100) return notify("error", "抵扣比例需填写 0~100 的数字");
          ratioValue = String(ratioNum);
        }
        const editingId = state.couponModal.mode === "edit" ? state.couponModal.sourceId : "";
        const duplicate = state.data.coupons.some(c => c.id !== editingId && c.type === draft.type && parseMoney(c.amount) === amountNum);
        const dupTip = document.getElementById("mCouponAmountErr");
        if (dupTip) dupTip.classList.toggle("hidden", !duplicate);
        if (duplicate) return notify("error", "已存在相同红包！");

        let createdCouponId = "";
        if (state.couponModal.mode === "edit") {
          const row = state.data.coupons.find(c => c.id === state.couponModal.sourceId);
          if (!row) return notify("error", "红包不存在，无法编辑");
          row.project = draft.project;
          row.name = draft.name;
          row.type = draft.type;
          row.amount = formatAmount(amountNum);
          row.validDays = String(validDaysNum);
          if (ratioValue) row.ratio = ratioValue;
          else delete row.ratio;
          pushCouponLog(row, "编辑红包，更新红包标题、红包类型、金额、抵扣比例或有效期");
        } else {
          const newId = nextCouponId(draft.project);
          createdCouponId = newId;
          const row = {
            id: newId,
            project: draft.project,
            name: draft.name,
            type: draft.type,
            amount: formatAmount(amountNum),
            validDays: String(validDaysNum),
            totalIssue: 0,
            totalReceive: 0,
            status: "启用",
            enabled: true,
            logs: [{ operator: "Jenny", time: nowStamp(), content: "新增红包" }]
          };
          if (ratioValue) row.ratio = ratioValue;
          state.data.coupons.unshift(row);
        }

        closeModal();
        notify("success", state.couponModal.mode === "edit" ? "红包编辑成功" : "红包保存成功");
        if (state.taskModal.returnAfterCouponCreate) {
          state.taskModal.returnAfterCouponCreate = false;
          const d = state.taskModal.draft;
          const selected = taskCouponIdsFromText(d.couponsText);
          if (createdCouponId && (d.type === "无任务" || selected.length === 0) && selected.length < MAX_TASK_COUPONS) {
            d.couponsText = [d.couponsText, createdCouponId].filter(Boolean).join(d.couponsText ? "," : "");
          } else if (createdCouponId && selected.length >= MAX_TASK_COUPONS) {
            notify("warn", `单个任务最多添加${MAX_TASK_COUPONS}个红包（按数量累计）`);
          }
          state.mainTab = "task";
          switchPage("task-create-modal");
        } else {
          state.taskModal.returnAfterCouponCreate = false;
          switchMain("coupon");
        }
      };
      }
    }

    function render() {
      renderRoleSwitcher();
      renderMainTabs();
      renderCurrentPage();
      bindPageActions();
    }

    // 初始渲染
    render();
  </script>
</body>
</html>
